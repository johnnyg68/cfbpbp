<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error 404 - Page not found</title>
<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 12px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html, body {
	height: 100%;
}

body {
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.55;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 24px;
}

.error-card {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	padding: 48px 40px;
	max-width: 480px;
	width: 100%;
	text-align: center;
}

.error-code {
	font-size: clamp(64px, 16vw, 110px);
	font-weight: 800;
	line-height: 1;
/* 	letter-spacing: -2px; */
	color: var(--brand-navy);
	margin: 0;
}

.error-code .accent {
	color: var(--accent);
	-webkit-text-stroke: 1px var(--brand-navy);
}

.error-card h1 {
	font-size: clamp(20px, 4vw, 26px);
	font-weight: 700;
	margin: 12px 0 6px;
	color: var(--text);
}

.error-card p {
	font-size: 15px;
	color: var(--text-muted);
	margin: 0 0 28px;
}

.home-btn {
	display: inline-block;
	background: var(--brand-navy);
	color: #fff;
	font-size: 15px;
	font-weight: 700;
	text-decoration: none;
	padding: 12px 28px;
	border-radius: 8px;
	box-shadow: var(--shadow);
	transition: background-color 0.15s ease, transform 0.15s ease;
}

.home-btn:hover {
	background: var(--brand-navy-light);
	transform: translateY(-2px);
	color: #fff;
}
</style>
</head>
<body>
	<div class="error-card">
		<p class="error-code">4<span class="accent">0</span>4</p>
		<h1>Fumble! Page not found</h1>
		<p>That page got stuffed at the line of scrimmage. Use the link below, then navigate from the menu.</p>
		<a class="home-btn" href="/">Back to Home</a>
	</div>
</body>
</html>
