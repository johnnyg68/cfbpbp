<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="utf-8">

<link href="/css/navbar.css" rel="stylesheet">

<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--accent-hover: #ffd633;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 12px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--shadow-hover: 0 8px 24px rgba(16, 24, 40, 0.12);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html {
	height: 100%;
}

body {
	min-height: 100%;
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.00;
}

a {
	color: var(--link);
	text-decoration: none;
/* 	transition: color 0.15s ease; */
}

a:hover {
	color: var(--brand-navy);
}

/* ---- Layout ---- */
.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 24px 24px 64px;
}

/* ---- Player banner ---- */
#bannerDiv {
	display: flex;
	align-items: center;
	gap: 14px;
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	padding: 16px 22px;
	margin-bottom: 20px;
}

#bannerDiv img {
	height: 50px;
	width: 50px;
	object-fit: contain;
}

h1 {
	font-size: clamp(20px, 3vw, 26px);
	margin: 0;
}

/* ---- Stat sections ---- */
.card {
	margin-bottom: 24px;
}

.card h3 {
	font-size: 18px;
	font-weight: 700;
	color: var(--brand-navy);
	margin: 0 0 12px;
}

/* ---- Tabs ---- */
.tab {
	display: flex;
/* 	gap: 4px; */
	overflow: hidden;
	font-family: var(--font);
}

.tab button {
	background-color: #999999;
	border: none;
	outline: none;
	cursor: pointer;
	padding: 8px 16px;
	border-top-left-radius: 10px;
	border-top-right-radius: 10px;
	font-family: var(--font);
	font-size: 14px;
	font-weight: 700;
	color: #fff;
	text-decoration: none;
	transition: background-color 0.15s ease;
}

.tab button:hover {
	background-color: var(--brand-navy-light);
}

.tabcontent {
	display: none;
	width: 100%;
	padding: 18px;
	background: var(--surface);
	border: 1px solid var(--border);
	border-top: none;
	border-top-right-radius: var(--radius);
	border-bottom-left-radius: var(--radius);
	border-bottom-right-radius: var(--radius);
	box-shadow: var(--shadow);
}

.tabcontent.is-active {
	display: block;
}

/* ---- Tables ---- */
/* far-left / far-right borders on the stat-table data (matches team.html) */
table.bordered td:first-child {
	border-left: 1px solid var(--border);
}

table.bordered td:last-child {
	border-right: 1px solid var(--border);
}

table {
	font-family: var(--font);
	font-size: 13px;
	border-collapse: collapse;
	width: 100%;
	border: none;
	border-top-left-radius: var(--radius);
	border-top-right-radius: var(--radius);
	overflow: hidden;
}

table td {
	font-size: 13px;
	border-bottom: 1px solid var(--border);
	padding: 8px 10px;
	vertical-align: middle;
}

table td a {
	color: var(--link);
	font-weight: 600;
}

table th {
	font-size: 13px;
	font-weight: 800;
	letter-spacing: 0.02em;
	text-align: left;
	background-color: var(--brand-navy);
	color: #fff;
	padding: 10px;
}

table tr:hover {
	background-color: #eef2f7;
}

@media (max-width: 600px) {
	.container {
		padding: 20px 14px 48px;
	}
}
</style>
</head>

<body onload="setStats();">

<script th:inline="javascript">
var year;
var playerName = "";
var teamId = "";

var playerId = /*[[${playerId}]]*/ null;
var passing = /*[[${passing}]]*/ null;
var rushing = /*[[${rushing}]]*/ null;
var receiving = /*[[${receiving}]]*/ null;
var defense = /*[[${defense}]]*/ null;
var kickReturns = /*[[${kickReturns}]]*/ null;
var puntReturns = /*[[${puntReturns}]]*/ null;
var punting = /*[[${punting}]]*/ null;
var kicking = /*[[${kicking}]]*/ null;

var passingGames = /*[[${passingGames}]]*/ null;
var rushingGames = /*[[${rushingGames}]]*/ null;
var receivingGames = /*[[${receivingGames}]]*/ null;
var defenseGames = /*[[${defenseGames}]]*/ null;
var kickReturnsGames = /*[[${kickReturnsGames}]]*/ null;
var puntReturnsGames = /*[[${puntReturnsGames}]]*/ null;
var puntingGames = /*[[${puntingGames}]]*/ null;
var kickingGames = /*[[${kickingGames}]]*/ null;

//Career Totals
var passingTotal = /*[[${passingTotal}]]*/ null;
var rushingTotal = /*[[${rushingTotal}]]*/ null;
var receivingTotal = /*[[${receivingTotal}]]*/ null;
var defenseTotal = /*[[${defenseTotal}]]*/ null;
var kickReturnsTotal = /*[[${kickReturnsTotal}]]*/ null;
var puntReturnsTotal = /*[[${puntReturnsTotal}]]*/ null;
var puntingTotal = /*[[${puntingTotal}]]*/ null;
var kickingTotal = /*[[${kickingTotal}]]*/ null;

function setStats() {
 	setYearsTable(passing, "passing", "passingYearsData", passingTotal);
	setYearsTable(rushing, "rushing", "rushingYearsData", rushingTotal);
	setYearsTable(receiving, "receiving", "receivingYearsData", receivingTotal);
  	setYearsTable(defense, "defense", "defenseYearsData", defenseTotal);
  	setYearsTable(kickReturns, "kickReturns", "kickReturnsYearsData", kickReturnsTotal);
	setYearsTable(puntReturns, "puntReturns", "puntReturnsYearsData", puntReturnsTotal);
	setYearsTable(punting, "punting", "puntingYearsData", puntingTotal);
	setYearsTable(kicking, "kicking", "kickingYearsData", kickingTotal);

	setGamesTable(passingGames, "passing", "passingGamesData");
	setGamesTable(rushingGames, "rushing", "rushingGamesData");
	setGamesTable(receivingGames, "receiving", "receivingGamesData");
	setGamesTable(defenseGames, "defense", "defenseGamesData");
	setGamesTable(kickReturnsGames, "kickReturns", "kickReturnsGamesData");
	setGamesTable(puntReturnsGames, "puntReturns", "puntReturnsGamesData");
	setGamesTable(puntingGames, "punting", "puntingGamesData");
	setGamesTable(kickingGames, "kicking", "kickingGamesData");

 	var html = `<img src='https://a.espncdn.com/i/teamlogos/ncaa/500/${teamId}.png' height='50' width='50'><h1>${playerName}</h1>`;
	document.getElementById("bannerDiv").innerHTML = html;
	document.title = "Player - " + playerName;
}

function setYearsTable(stats, divParent, divName, totalRow) {
	//skip null data
	if(isValidData(stats) == 0) {
		document.getElementById(divParent).style.display = "none";
		return;
	}

	var json = JSON.parse(stats);

	if(playerName == "") {
		playerName = json[0].Name;
	}

	var html = "<br/>";
	html += "<table class='bordered'>";
	var columnsToExclude = ["TeamId", "Name"];
	html += getTableHeader(json[0], columnsToExclude);

	for(var i=0; i<json.length; i++) {
		var row = json[i];

		var temp = `/teams/team/${row.TeamId}/year/${row.Year}`;
		var link = `<a href="${temp}">${row.Team}</a>`;
		var linkColumns = {
			Team : link
		}

		if(year === undefined) {
			year = row.Year;
			teamId = row.TeamId;
		}

		if(row.Year > year) {
			year = row.Year;
			teamId = row.TeamId;
		}
		html += getTableRow(row, columnsToExclude, linkColumns);
	}
// append total row to table
// TODO  this doesn't work for players who played for multiple teams.  See Joe Milton Mich/Tennessee
// 	var row = JSON.parse(totalRow);
// 	html += getTableRow(row[0], columnsToExclude, '');

	html += "</table><br/>";
	document.getElementById(divName).innerHTML = html;
}

function setGamesTable(stats, divParent, divName) {

	if(isValidData(stats) == 0) {
		document.getElementById(divParent).style.display = "none";
		return;
	}

	var json = JSON.parse(stats);

	if(playerName == "") {
		playerName = json[0].Name;
	}

	var html = "<br/>";
	html += "<table class='bordered'>";
	var columnsToExclude = ["TeamId", "Name", "Year", "GameId", "OppId", "Site", "OppRank"];
	html += getTableHeader(json[0], columnsToExclude);

	for(var i=0; i<json.length; i++) {
		var row = json[i];

		var teamLink = `<a href="/teams/team/${row.TeamId}/year/${row.Year}">${row.Team}</a>`;
		var site = "";
		var rank = "";

		if(row.Site != '') {
			site = row.Site + " ";
		}

		if(row.Rank != '') {
			rank = row.OppRank + " ";
		}

		var oppTeamLink = `<a href="/teams/team/${row.OppId}/year/${row.Year}">${site}${rank}${row.Opponent}</a>`;
		var dateLink = `<a href="/games/game/${row.GameId}/boxscore">${row.Date}</a>`;

		var linkColumns = {
			Date : dateLink,
			Team : teamLink,
			Opponent : oppTeamLink
			//Result : resultLink
		}

		html += getTableRow(row, columnsToExclude, linkColumns);
	}
	html += "</table><br/>";
	document.getElementById(divName).innerHTML = html;
}

function tabClick(tabContentsId, tab) {

	var tabs = tab.parentNode.children;

	for(aTab of tabs) {
		var isActive = (tab.id == aTab.id);
		aTab.style.backgroundColor = isActive ? "#00274c" : "#999999";
		// each tab's content id is its button id without the trailing "Tab"
		var contentId = aTab.id.substr(0, aTab.id.length - 3);
		document.getElementById(contentId).classList.toggle("is-active", isActive);
	}
}

//TODO - make this more efficient
// set default tabs and make them visible
document.getElementById("passingYearsTab").click();
document.getElementById("rushingYearsTab").click();
document.getElementById("receivingYearsTab").click();
document.getElementById("defenseYearsTab").click();
document.getElementById("kickReturnsYearsTab").click();
document.getElementById("puntReturnsYearsTab").click();
document.getElementById("puntingYearsTab").click();
document.getElementById("kickingYearsTab").click();

</script>
