<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${title}">CFB Geek college football rankings</title>
<meta name="description" content="College Football Data Rankings">
<meta name="author" content="John Gilliam">

<link href="/css/navbar.css" rel="stylesheet">
<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--accent-hover: #ffd633;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 6px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--shadow-hover: 0 8px 24px rgba(16, 24, 40, 0.12);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html {
	height: 100%;
}

body {
	min-height: 100%;
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.0;
}

a {
	color: var(--link);
	text-decoration: none;
/* 	transition: color 0.15s ease; */
}

a:hover {
	color: var(--brand-navy);
}

/* ---- Hero ---- */
.hero {
	background: var(--bg);
	color: #000;
	padding: 18px 24px;
	text-align: center;
}

.hero h1 {
	margin: 0;
	font-size: clamp(22px, 4vw, 32px);
	font-weight: 700;
	letter-spacing: -0.5px;
}

/* ---- Layout ---- */
.container {
	max-width: 1200px;
	margin: 0 auto;
	padding: 24px 24px 64px;
}

/* ---- Controls / filters ---- */
.controls {
	display: flex;
	flex-wrap: wrap;
	align-items: center;
	gap: 10px;
	margin-bottom: 20px;
}

.controls label {
	font-size: 15px;
	font-weight: 700;
	color: var(--text);
}

.controls select {
	font-family: var(--font);
	font-size: 14px;
	color: var(--text);
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: 8px;
	padding: 8px 12px;
	box-shadow: var(--shadow);
	cursor: pointer;
/* 	transition: border-color 0.15s ease; */
}

.controls select:hover,
.controls select:focus {
	border-color: var(--brand-navy);
	outline: none;
}

/* ---- Ranking cards ---- */
.panel-row {
	display: flex;
	flex-wrap: wrap;
	gap: 20px;
	align-items: flex-start;
}

.card {
	flex: 1 1 360px;
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	padding: 20px 22px;
}

.card h3 {
	font-size: 18px;
	font-weight: 700;
	color: var(--brand-navy);
	margin: 0 0 14px;
}

/* AP panel stays narrow; SP+ panel takes the freed space */
#apDiv {
	flex: 0 1 320px;
}

#spDiv {
	flex: 1 1 360px;
}

/* ---- Tables ---- */
table {
	font-family: var(--font);
	font-size: 13px;
	border-collapse: collapse;
	width: 100%;
	border: none;
	border-top-left-radius: var(--radius);
	border-top-right-radius: var(--radius);
	overflow: hidden;
}

table td {
	font-size: 13px;
	border-bottom: 1px solid var(--border);
	padding: 8px 10px;
	vertical-align: middle;
}

table td:first-child {
	border-left: 1px solid var(--border);
}

table td:last-child {
	border-right: 1px solid var(--border);
}

table td a {
	color: var(--link);
	font-weight: 600;
}

table th {
	font-size: 13px;
	font-weight: 800;
	letter-spacing: 0.02em;
	text-align: left;
	background-color: var(--brand-navy);
	color: #fff;
	padding: 10px;
}

table tr:hover {
	background-color: #eef2f7;
}

table td img {
	vertical-align: middle;
	margin-right: 8px;
	height: 24px;
	width: 24px;
	object-fit: contain;
}

@media (max-width: 600px) {
	.container {
		padding: 20px 14px 48px;
	}
}
</style>
</head>

<body onload="setRankings('ap'); setRankings('sp'); setYearOptions();">

<div class="navbar">
	<a href="/">CFB GEEK</a>
	<a href="/teams">Teams</a>
	<a href="#" onclick="gotoYearSchedule(year)">Schedule</a>
	<a href="#" onclick="gotoYearStats(year)">Stats</a>
	<a href="#" onclick="gotoYearRankings(year)">Rankings</a>
	<a href="#" onclick="gotoYearRecruiting(year)">Recruiting</a>
</div>

<header class="hero">
	<h1 th:text="${title}"></h1>
</header>

<main class="container">

	<div class="controls" id="yearDiv">
		<label for="yearSelector">Year:</label>
		<select id="yearSelector" onchange="changeYear(this.value)"></select>
	</div>

	<div class="panel-row">
		<div class="card" id="apDiv"></div>
		<div class="card" id="spDiv"></div>
	</div>

</main>

<script th:inline="javascript">

let year = /*[[${year}]]*/ null;
let title = /*[[${title}]]*/ null;
const apRankings = /*[[${apRankings}]]*/ null;
const spRankings = /*[[${spRankings}]]*/ null;
let sortOrder = /*[[${sortOrder}]]*/ null;

function setRankings(rankings) {
	let json = "";
	const columnsToExclude = ["TeamId"];
	let html = "";
	let rankingsDiv = "";

	if(year == undefined) {
		year = getMaxYear();
	}

	if(rankings == 'ap') {
		json = JSON.parse(apRankings);
		rankingsDiv = "apDiv";
		html = "<h3>AP Poll</h3>";
		html += "<table id='apTable'>";
	} else {
		json = JSON.parse(spRankings);
		rankingsDiv = "spDiv";
		html = "<h3>SP+ Rankings</h3>";
		html += "<table id='spTable'>";
	}

	html += getTableHeader(json[0], columnsToExclude);

	for(let i=0; i<json.length; i++) {
		let row = json[i];
		let teamLink = `<img src='https://a.espncdn.com/i/teamlogos/ncaa/500/${row.TeamId}.png' alt='${row.Team} logo'></img><a href='/teams/team/${row.TeamId}/year/${year}'>${row.Team}</a>`;
		const columnLinks = {
			Team : teamLink,
		}

		html += getTableRow(row, columnsToExclude, columnLinks);
	}

	html += "</table>";
	document.getElementById(rankingsDiv).innerHTML = html;
}

function setYearOptions() {
	let maxYear = getMaxYear();
	let minYear = getMinYear();
	let yearOptions = "";

	for(maxYear; maxYear>=minYear; maxYear--) {
		let selected = (maxYear == year ? "selected" : "");
		yearOptions += `<option value="${maxYear}" ${selected}>${maxYear}</option>`;
	}
	document.getElementById("yearSelector").innerHTML += yearOptions;
}

//http://localhost:8080/stats/year/2015/apranking
function changeYear(selectedYear) {
	newUrl = "/stats/year/" + selectedYear + "/rankings";
	window.location = newUrl;
}

</script>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

<script type="text/javascript" th:src="@{/js/navbar.js}"></script>
<script type="text/javascript" th:src="@{/js/table.js}"></script>
<script type="text/javascript" th:src="@{/js/yearChoices.js}"></script>
</body>
</html>
