<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFB Geek - Teams by Conference</title>
<meta name="description" content="College Football Data Teams by Conference">
<meta name="author" content="John Gilliam">

<link href="/css/navbar.css" rel="stylesheet">
<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--accent-hover: #ffd633;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 12px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--shadow-hover: 0 8px 24px rgba(16, 24, 40, 0.12);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html {
	height: 100%;
}

body {
	min-height: 100%;
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.00;
}

a {
	color: var(--link);
	text-decoration: none;
	transition: color 0.15s ease;
}

a:hover {
	color: var(--brand-navy);
}

/* ---- Hero ---- */
.hero {
	background: var(--bg);
	color: #000;
	padding: 18px 24px;
	text-align: center;
}

.hero h1 {
	margin: 0;
	font-size: clamp(22px, 4vw, 32px);
	font-weight: 700;
	letter-spacing: -0.5px;
}

/* ---- Layout ---- */
.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 40px 24px 64px;
}

/* ---- Conference cards ---- */
.conference-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
	gap: 18px;
}

.conference-card {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	overflow: hidden;
	transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.conference-card:hover {
	transform: translateY(-2px);
	box-shadow: var(--shadow-hover);
}

.conference-name {
	margin: 0;
	padding: 12px 16px;
	background: var(--brand-navy);
	color: #fff;
	font-size: 15px;
	font-weight: 700;
	/* border-bottom: 3px solid var(--accent); */
}

.team-list {
	list-style: none;
	margin: 0;
	padding: 6px 0;
}

.team-row {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 7px 16px;
	font-size: 14px;
	font-weight: 600;
	color: var(--text);
	transition: background-color 0.12s ease;
}

.team-row:hover {
	background-color: #eef2f7;
	color: var(--brand-navy);
}

.team-row img {
	height: 24px;
	width: 24px;
	object-fit: contain;
	flex-shrink: 0;
}

@media (max-width: 600px) {
	.container {
		padding: 32px 16px 48px;
	}
}
</style>
</head>
<body onload="jsonToTable()">

<div class="navbar">
	<a href="/">CFB GEEK</a>
	<a href="/teams">Teams</a>
	<a href="#" onclick="gotoYearSchedule(year)">Schedule</a>
	<a href="#" onclick="gotoYearStats(year)">Stats</a>
	<a href="#" onclick="gotoYearRankings(year)">Rankings</a>
	<a href="#" onclick="gotoYearRecruiting(year)">Recruiting</a>
</div>

<header class="hero">
	<h1>Teams by Conference</h1>
</header>

<main class="container">
	<div id="Conferences" class="conference-grid"></div>
</main>

<script th:inline="javascript">
let year = "";

function jsonToTable() {
	year = getMaxYear();

	let json = /*[[${dataJson}]]*/ null;
	let jsonParsed = JSON.parse(json);
	let jsonMap = jsonToMap(jsonParsed);
	let html = "";

	for (let [conference, teams] of jsonMap.entries()) {
		html += `<div class="conference-card">`;
		html += `<h2 class="conference-name">${conference}</h2>`;
		html += `<ul class="team-list">`;

		for (team in teams) {
			let teamObj = teams[team];
			let teamUrl = `/teams/team/${teamObj.TeamId}/history`;
			let img = `<img src="https://a.espncdn.com/i/teamlogos/ncaa/500/${teamObj.TeamId}.png" alt="${teamObj.Team} logo" loading="lazy">`;
			html += `<li><a class="team-row" href="${teamUrl}">${img}${teamObj.Team}</a></li>`;
		}

		html += `</ul>`;
		html += `</div>`;
	}

	document.getElementById("Conferences").insertAdjacentHTML("beforeend", html);
}

//create Map<Conference,List<Teams>>
function jsonToMap(json) {
	let map = new Map();
	let teams = [];

	for (let i = 0; i < json.length; i++) {
		let conference = json[i].Conference;
		teams = map.get(conference);
		if (teams == undefined) {
			teams = [];
		}
		teams.push(json[i]);
		map.set(conference, teams);
	}
	return map;
}

</script>
<script type="text/javascript" th:src="@{/js/yearChoices.js}"></script>
<script type="text/javascript" th:src="@{/js/navbar.js}"></script>
<script type="text/javascript" th:src="@{/js/table.js}"></script>
</body>
</html>
