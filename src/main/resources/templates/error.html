<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error Page</title>
    <style>
        body { line-height: 1.0; }
    </style>
</head>
<body>
    <h1>Something went wrong!</h1>
    <p th:text="${status}"></p>
    <p th:text="${error}"></p>
    <p th:text="${message}"></p>
    <pre th:text="${trace}"></pre>
</body>
</html>
