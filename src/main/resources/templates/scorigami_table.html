<script th:inline="javascript">

let title = /*[[${title}]]*/ null;
const stats = /*[[${stats}]]*/ null;
const maxWinnerScore = /*[[${maxWinnerScore}]]*/ null;
const maxLoserScore = /*[[${maxLoserScore}]]*/ null;
let rows = JSON.parse(maxLoserScore)[0].max_loser_score;
let cols = JSON.parse(maxWinnerScore)[0].max_winner_score;
let json = JSON.parse(stats); 
let year = null; // assigned in body onload, after yearChoices.js (getMaxYear) loads

function setStats() {
	let html = "<table id='statTable'>";

	html += "<thead><tr><th>&nbsp;</th>";
	for(let i = 0; i<=cols; i++) {
		if(i < 10) {
			html += "<th>&nbsp;" + i + "</th>";
		} else {
			html += "<th>" + i + "</th>";	
		}
	}
	html += "</tr></thead>";
	html += "<tbody>";
	
	// add rows in table body and assign IDs to each cell based on row+col
 	for(let x = 0; x < rows + 1; x++) {
		html += "<tr>"

		for(let y=0; y <= cols + 1; y++) { 
			// y-axis
			if( y === 0 ) {
				html += "<td><b>" + x + "</b></td>";	
			} else {
				let xy = "x" + (y-1) + "y" + x;
				html += "<td id=" + xy + "></td>"
			}
		}
		html += "</tr>";
	}
	html += "</tbody>";
	html += "</table>";
	document.getElementById("statsDiv").innerHTML = html; 
	
	paintScorigamiCells();
	paintImpossibleScores();
	
	$("#statTable").on("click", "td a", function(e) {
		let cell = this.parentElement;
		let games = cell.innerText; 
		let id = cell.id;
		let winnerScore = id.substr(1, id.indexOf("y") - 1);
		let loserScore = id.substr(id.indexOf("y") + 1);

		window.location = "/stats/games/byscore/winner/" + winnerScore + "/loser/" + loserScore;

	    return false;
	});
}

function paintScorigamiCells() {
	let winner; 
	let loser;
	let games;
	
	for(let i=0; i<json.length; i++) {
		winner = json[i].winner;
		loser = json[i].loser;
		games = json[i].games;
		
		let cell = document.getElementById("x" + winner + "y" + loser);
		cell.style.backgroundColor = "#ffcb05"; // MAIZE

		cell.innerHTML = "<a href=''>" + games + "</a>";
	}
}

function paintImpossibleScores() {
	for(let x = 0; x < cols; x++) {
		for(let y = 0; y < rows + 1; y++) {
			if(x <= y) {
				let cell = document.getElementById("x" + x + "y" + y);
				cell.style.backgroundColor = "#00274c"; // BLUE 
			}
		}
	}
}
