<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${title}">CFB Geek college football recruiting</title>
<meta name="description" content="College Football Data Recruiting">
<meta name="author" content="John Gilliam">

<link href="/css/navbar.css" rel="stylesheet">
<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--accent-hover: #ffd633;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 12px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--shadow-hover: 0 8px 24px rgba(16, 24, 40, 0.12);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html {
	height: 100%;
}

body {
	min-height: 100%;
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.55;
}

a {
	color: var(--link);
	text-decoration: none;
	transition: color 0.15s ease;
}

a:hover {
	color: var(--brand-navy);
}

/* ---- Hero ---- */
.hero {
	background: var(--bg);
	color: #000;
	padding: 18px 24px;
	text-align: center;
}

.hero h1 {
	margin: 0;
	font-size: clamp(22px, 4vw, 32px);
	font-weight: 700;
	letter-spacing: -0.5px;
}

#pageTitle a {
	color: var(--link);
}

/* ---- Layout ---- */
.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 24px 24px 64px;
}

/* ---- Controls / filters ---- */
.controls {
	display: flex;
	flex-wrap: wrap;
	align-items: center;
	gap: 10px;
	margin-bottom: 20px;
}

.controls select {
	font-family: var(--font);
	font-size: 14px;
	color: var(--text);
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: 8px;
	padding: 8px 12px;
	box-shadow: var(--shadow);
	cursor: pointer;
	transition: border-color 0.15s ease;
}

.controls select:hover,
.controls select:focus {
	border-color: var(--brand-navy);
	outline: none;
}

/* ---- Table ---- */
.table-wrap {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	overflow: hidden;
}

table {
	font-family: var(--font);
	font-size: 13px;
	border-collapse: collapse;
	width: 100%;
	border: none;
}

table td {
	font-size: 13px;
	border-bottom: 1px solid var(--border);
	padding: 8px 10px;
	vertical-align: middle;
}

table td a {
	color: var(--link);
	font-weight: 600;
}

table th {
	font-size: 13px;
	font-weight: 800;
	letter-spacing: 0.02em;
	text-align: left;
	background-color: var(--brand-navy);
	color: #fff;
	padding: 10px;
}

/* Sortable header links */
#dataTable th a {
	color: #fff;
	text-decoration: none;
	cursor: pointer;
}

#dataTable th:hover {
	background-color: var(--brand-navy-light);
	cursor: pointer;
}

#dataTable tbody tr:hover {
	background-color: #eef2f7;
}

/* First column (row rank) shrinks to fit its content for any dataset */
#dataTable th:nth-child(1),
#dataTable td:nth-child(1) {
	width: 1%;
	white-space: nowrap;
}

@media (max-width: 600px) {
	.container {
		padding: 20px 14px 48px;
	}
}
</style>
</head>

<body onload="setSelectorOptions(); setData();">

<div class="navbar">
	<a href="/">CFB GEEK</a>
	<a href="/teams">Teams</a>
	<a href="#" onclick="gotoYearSchedule(year)">Schedule</a>
	<a href="#" onclick="gotoYearStats(year)">Stats</a>
	<a href="#" onclick="gotoYearRankings(year)">Rankings</a>
	<a href="#" onclick="gotoYearRecruiting(year)">Recruiting</a>
</div>

<header class="hero">
	<div id="pageTitle">
		<h1 th:text="${title}"></h1>
	</div>
</header>

<main class="container">

	<div class="controls" id="selectorDiv">
		<select id="yearSelector" onchange="changeYear(this.value)">
			<option value="empty">Select a year</option>
		</select>
		<select id="teamSelector" onchange="changeTeam(this.value)">
			<option value="empty">Select a Team</option>
		</select>
	</div>

	<div class="table-wrap" id="dataDiv"></div>

</main>

<script th:inline="javascript">

let year = /*[[${year}]]*/ null;
let title = /*[[${title}]]*/ null;
let type = /*[[${type}]]*/ null;
const recruiting = /*[[${recruiting}]]*/ null;
let teams = /*[[${teams}]]*/ null;
let sortOrder = /*[[${sortOrder}]]*/ null;
let teamId = /*[[${teamId}]]*/ null;
let teamName;

function setData() {

	let json = JSON.parse(recruiting);
	let html = "<table id='dataTable'>";
	let columnsToExclude;
	let columnLinks;

	if(type == "Team") {
		//recruiting results for a team
		columnsToExclude = ["TeamId", "Team"];
		teamName = json[0].Team;
		document.getElementById("pageTitle").innerHTML = `<h1><a href='/teams/team/${json[0].TeamId}/history'>${json[0].Team}</a> - Recruiting</h1>`;
		window.document.title = json[0].Team + " - Recruiting";
	} else if (type == "Year") {
		//recruity results for all teams for a year
		columnsToExclude = ["TeamId", "Year"];
	}

	html += getTableHeaderSortable(json[0], columnsToExclude);
	html += "<tbody>";

	for(let i=0; i<json.length; i++) {
		let row = json[i];
		let teamLink = `<a href='/teams/team/${row.TeamId}/history'>${row.Team}</a>`;
		let yearLink = `<a href='/teams/team/${row.TeamId}/history'>${row.Year}</a>`;
		columnLinks = {
			Team : teamLink,
			Year : yearLink,
		}

		html += getTableRow(row, columnsToExclude, columnLinks, i+1);
	}

	html += "</tbody></table>";
	document.getElementById("dataDiv").innerHTML = html;

	// LOAD EVENT HANDLERS FOR TABLE COLUMNS IN DYNAMIC TABLE "#dataTable"

	// THIS WORKS without performance degradation.
	// Solution is to use $(#dataTable).on() instead of $(document).on()
	$("#dataTable").on("click", "th a", function(e) {
		//TODO - this seems wrong
		// stringify json so that setData() { JSON.parse(json) } will work.
	    recruiting = JSON.stringify(sortByKey(json, this.id));
	    setData();
	    // color selected column header and text
	    document.getElementById(this.id).parentElement.style.background = "#ffcb05";  //maize
	    document.getElementById(this.id).style.color = "#00274c";	//blue
	});

}

function sortByKey(array, key) {
    return array.sort(function(a, b) {
        var x = a[key];
        var y = b[key];
        if(sortOrder == null || sortOrder == 1) {
            return ((x < y) ? 1 : ((x > y) ? -1 : 0));    // descending
        } else {
        	return ((x > y) ? 1 : ((x < y) ? -1 : 0));    // ascending
        }
    });
}

function changeYear(selectedYear) {
	year = selectedYear;
	window.location = "/recruiting/year/" + selectedYear;
}

function changeTeam(selectedTeam) {
	teamId = selectedTeam;
	window.location = "/recruiting/team/" + selectedTeam;
}

//TODO - hardcoded max year loop.  fix this
function setSelectorOptions() {
	let yearOptions;
	if(type == "Team") {
		yearOptions = "<option value='''>Select Year</option>";
	}

	for(let i=2025; i>=2000; i--) {
		let selected = (i == year ? "selected" : "");
		yearOptions += `<option value="${i}" ${selected}>${i}</option>`;
	}
	document.getElementById("yearSelector").innerHTML = yearOptions;

	let teamOptions;
	if(type == "Year") {
		teamOptions = "<option value=''>Select Team</option>";
	}
	let json = JSON.parse(teams);
	for(let i=0; i<json.length; i++) {
		let row = json[i];
		let selected = (teamId == row.TeamId ? "selected" : "");
		teamOptions += `<option value="${row.TeamId}" ${selected}>${row.Name}</option>`;
	}
	document.getElementById("teamSelector").innerHTML = teamOptions;
}


</script>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

<script type="text/javascript" th:src="@{/js/navbar.js}"></script>
<script type="text/javascript" th:src="@{/js/table.js}"></script>
</body>
</html>
