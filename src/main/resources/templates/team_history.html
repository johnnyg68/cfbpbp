<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFB Geek college football teams</title>
<meta name="description" content="College Football Data Teams History">
<meta name="author" content="John Gilliam">
<link href="/css/navbar.css" rel="stylesheet">

<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--accent-hover: #ffd633;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 12px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--shadow-hover: 0 8px 24px rgba(16, 24, 40, 0.12);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html {
	height: 100%;
}

body {
	min-height: 100%;
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.55;
}

a {
	color: var(--link);
	text-decoration: none;
	transition: color 0.15s ease;
}

a:hover {
	color: var(--brand-navy);
}

/* ---- Layout ---- */
.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 24px 24px 64px;
}

h1 {
	font-size: clamp(20px, 3vw, 26px);
	margin: 0 0 4px;
}

h3 {
	font-size: 16px;
	font-weight: 700;
	color: var(--brand-navy);
	margin: 0 0 10px;
}

/* ---- Team header ---- */
#teamDetails {
	text-align: center;
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	padding: 20px 24px;
	margin-bottom: 20px;
}

#bannerImg {
	height: 75px;
	width: 75px;
	object-fit: contain;
}

/* ---- Tabs ---- */
.tab {
	display: flex;
	flex-wrap: wrap;
	/* gap: 4px; */
	overflow: hidden;
	font-family: var(--font);
}

.tab button {
	background-color: #999999;
	border: none;
	outline: none;
	cursor: pointer;
	padding: 9px 16px;
	border-top-left-radius: 10px;
	border-top-right-radius: 10px;
	font-family: var(--font);
	font-size: 14px;
	font-weight: 700;
	color: #fff;
	text-decoration: none;
	transition: background-color 0.15s ease;
}

.tab button:hover {
	background-color: var(--brand-navy-light);
}

/* ---- Tab content panels ---- */
.tabcontent {
	display: none;
	width: 100%;
	padding: 18px;
	background: var(--surface);
	border: 1px solid var(--border);
	border-top: none;
	border-bottom-left-radius: var(--radius);
	border-bottom-right-radius: var(--radius);
	box-shadow: var(--shadow);
}

/* ---- Tables ---- */
table {
	font-family: var(--font);
	font-size: 13px;
	border-collapse: collapse;
	width: 100%;
	border: none;
	border-top-left-radius: var(--radius);
	border-top-right-radius: var(--radius);
	overflow: hidden;
}

table td {
	font-size: 13px;
	border-bottom: 1px solid var(--border);
	padding: 8px 10px;
	vertical-align: middle;
}

table td:first-child {
	border-left: 1px solid var(--border);
}

table td:last-child {
	border-right: 1px solid var(--border);
}

table td a {
	color: var(--link);
	font-weight: 600;
}

table th {
	font-size: 13px;
	font-weight: 800;
	letter-spacing: 0.02em;
	text-align: left;
	vertical-align: top;
	background-color: var(--brand-navy);
	color: #fff;
	padding: 10px;
}

table.sortable thead th:hover {
	background-color: var(--brand-navy-light) !important;
	cursor: pointer;
}

table tr:hover {
	background-color: #eef2f7;
}

.child {
	display: none;
}

.parent {
	display: table-row;
}

/* small expand/collapse (plus/minus) icons in the vs-opponent table */
img {
	margin-right: 10px;
	height: 10px;
	width: 10px;
}

label {
	font-family: var(--font);
	font-size: 14px;
	margin-right: 12px;
}

/* ---- DivTable layout utilities (used by the tab panels) ---- */
.divTable {
	display: table;
	width: 100%;
}
.divTableRow {
	display: table-row;
}
.divTableBody {
	display: table-row-group;
}
.divTableCell {
	display: table-cell;
	width: 100%;
	padding: 0 0 12px;
	vertical-align: top;
}

@media (max-width: 600px) {
	.container {
		padding: 20px 14px 48px;
	}
}
</style>
</head>

<body onload="
	setYearLinks();
 	setTeamDetails();
 	setRankingsTable();
 	setBowlsTable();
 	setVsOpponentTable();
 	setYearAvgsTables();
 	setPlayerTables();
	setRecruiting();
 	setTableHeaderColor();
	document.getElementById('rankingsTab').click();"
>

<div class="navbar">
	<a href="/">CFB GEEK</a>
	<a href="/teams">Teams</a>
	<a href="#" onclick="gotoYearSchedule(year)">Schedule</a>
	<a href="#" onclick="gotoYearStats(year)">Stats</a>
	<div class="dropdown">
		<button class="dropbtn">Year
			<i class="fa fa-caret-down"></i>
		</button>
		<div class="dropdown-content" id="teamYears">
		</div>
	</div>
	<a href="#" onclick="gotoYearRankings(year)">Rankings</a>
	<a href="#" onclick="gotoYearRecruiting(year)">Recruiting</a>
</div>

<main class="container">

	<div id="teamDetails"></div>

	<div class="tab" id="tabs">
	  <button onclick="tabClick(this)" id="rankingsTab">Rankings</button>
	  <button onclick="tabClick(this)" id="bowlsTab">Bowls</button>
	  <button onclick="tabClick(this)" id="vsOpponentTab">vs Opponent</button>
	  <button onclick="tabClick(this)" id="yearAvgsTab">Year Avgs</button>
	  <button onclick="tabClick(this)" id="passingTab">Passing</button>
	  <button onclick="tabClick(this)" id="rushingTab">Rushing</button>
	  <button onclick="tabClick(this)" id="receivingTab">Receiving</button>
	  <button onclick="tabClick(this)" id="recruitingTab">Recruiting</button>
	</div>

	<div class="tabcontent" id="rankingsContent">
		<div class="divTableBody">
			<div class="divTableRow">
				<div class="divTableCell" id="rankingsTableDiv">
					<p>Rankings</p>
				</div>
			</div>
		</div>
	</div>

	<div class="tabcontent" id="bowlsContent">
		<div class="divTableBody">
			<div class="divTableRow">
				<div class="divTableCell" id="bowlsTableDiv">
					<p>Bowls</p>
				</div>
			</div>
		</div>
	</div>

	<div class="tabcontent" id="vsOpponentContent">
		<div class="divTableBody">
			<div class="divTableRow">
				<div class="divTableCell" id="vsOpponentTableDiv">
					<p>vs Opponent</p>
				</div>
			</div>
		</div>
	</div>

	<div class="tabcontent" id="yearsAvgContent">
		<div class="divTableBody">
			<div class="divTableRow">
				<div class="divTableCell" id="yearAvgOffense">
					<h3>Offense</h3>
					<table id="yearAvgOffenseTable" class="sortable">
						<thead></thead>
						<tbody></tbody>
					</table>
				</div>
			</div>
			<div class="divTableRow">
				<div class="divTableCell" id="yearAvgDefense">
					<h3>Defense</h3>
					<table id="yearAvgDefenseTable" class="sortable">
						<thead></thead>
						<tbody></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="tabcontent" id="passingContent">
		<div class="divTableBody">
			<label><b>Passing Totals by:</b></label>
			<input type="radio" id="passingByYear" name="passingTable" value="year" onchange="changePlayerData(name, value)" checked>
     		<label for="passingByYear">Year</label>
      		<input type="radio" id="passingByCareer" name="passingTable" value="career" onchange="changePlayerData(name, value)">
      		<label for="passingByCareer">Career</label>
      		<br><br>

			<div class="divTableRow">
				<div class="divTableCell" id="passingTableDiv">
					<table id="passingTable" class="sortable">
						<thead></thead>
						<tbody></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="tabcontent" id="rushingContent">
		<div class="divTableBody">
			<label><b>Rushing Totals by:</b></label>
			<input type="radio" id="rushingByYear" name="rushingTable" value="year" onchange="changePlayerData(name, value)" checked>
     		<label for="rushingByYear">Year</label>
      		<input type="radio" id="rushingByCareer" name="rushingTable" value="career" onchange="changePlayerData(name, value)">
      		<label for="rushingByCareer">Career</label>
      		<br><br>
      		
			<div class="divTableRow">
				<div class="divTableCell" id="rushingTableDiv">
					<table id="rushingTable" class="sortable">
						<thead></thead>
						<tbody></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="tabcontent" id="receivingContent">
		<div class="divTableBody">
			<label><b>Receiving Totals by:</b></label>
			<input type="radio" id="receivingByYear" name="receivingTable" value="year" onchange="changePlayerData(name, value)" checked>
     		<label for="receivingByYear">Year</label>
      		<input type="radio" id="receivingByCareer" name="receivingTable" value="career" onchange="changePlayerData(name, value)">
      		<label for="receivingByCareer">Career</label>
      		<br><br>
      		
			<div class="divTableRow">
				<div class="divTableCell" id="receivingTableDiv">
					<table id="receivingTable" class="sortable">
						<thead></thead>
						<tbody></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="tabcontent" id="recruitingContent">
		<div class="divTableBody">
			<div class="divTableRow">
				<div class="divTableCell" id="recruitingTableDiv">
					<p>Recruiting</p>
				</div>
			</div>
		</div>
	</div>

</main>

<script th:inline="javascript">

let teamColor = "";
const teamId = /*[[${teamId}]]*/ null;
let year;  // this is a hack. value is set in setRankingsTable()
let sortOrder = null;

function setTeamDetails() {
	const metadata = /*[[${metadata}]]*/ null;
	let json = JSON.parse(metadata);
	let teamName = json[0].name;
	let mascot = json[0].mascot;
	teamColor = json[0].color != "" ? "#" + json[0].color : "";

	let html = "";

	html += "<h1>" + teamName + " " + mascot + "</h1>" ;
	html += `<img src='https://a.espncdn.com/i/teamlogos/ncaa/500/${teamId}.png' alt='${teamName}' height='125' width='125' id='bannerImg'>`;

	document.getElementById('teamDetails').innerHTML = html;
	document.title = teamName + " History";
}

function setRankingsTable() {
	const rankings = /*[[${rankings}]]*/ null;
	let json = JSON.parse(rankings);
	let html = "";
	let columnsToExclude;

	//set table header
	html += "<br/><table>";
	html += getTableHeader(json[0]);

	//add row data
	for(let i=0; i<json.length; i++) {
		let row = json[i];
		let yearLink = `<a href='/teams/team/${teamId}/year/${row.Year}'>${row.Year}</a>`;

		let columnLinks = {
			Year : yearLink,
		}
		year = row.Year;
		html += getTableRow(row, columnsToExclude, columnLinks);
	}
	html += "</table><br/>";
	document.getElementById('rankingsTableDiv').innerHTML = html;
}

function setBowlsTable() {
	const bowls = /*[[${bowls}]]*/ null;
	const bowlsRecord = /*[[${bowlsRecord}]]*/ null;
	let json = JSON.parse(bowlsRecord);
	let html = "<h3>Bowl Record: " + json[0].W + " - " + json[0].L + "</h3>";

	json = JSON.parse(bowls);
	const columnsToExclude = ["GameId", "HomeTeamId", "AwayTeamId"];

	//set table header
	html += "<table>";
	html += getTableHeader(json[0], columnsToExclude);

	//add row data
	for(let i=0; i<json.length; i++) {
		let row = json[i];
		let yearLink = `<a href='/teams/team/${teamId}/year/${row.Year}'>${row.Year}</a>`;
		let teamLink = `<a href='/teams/team/${teamId}/year/${row.Year}'>${row.Team}</a>`;
		let opponentId = teamId == row.HomeTeamId ? row.AwayTeamId : row.HomeTeamId;
		let opponentLink = `<a href='/teams/team/${opponentId}/year/${row.Year}'>${row.Opponent}</a>`;
		let resultLink = `<a href='/games/game/${row.GameId}/boxscore'>${row.Result}</a>`;

		let columnLinks = {
			Year : yearLink,
			Team : teamLink,
			Opponent : opponentLink,
			Result : resultLink
		}

		html += getTableRow(row, columnsToExclude, columnLinks);
	}

	html += "</table><br/>";
	document.getElementById('bowlsTableDiv').innerHTML = html;
}

function setVsOpponentTable() {
	const vsOpponent = /*[[${vsOpponent}]]*/ null;
	let json = JSON.parse(vsOpponent);

	const plus = '<a href="#"><img src="/images/plus.png" /></a>';
	const minus = '<a href="#"><img src="/images/minus.png" /></a>';

	let wins = 0;
	let losses = 0;

	let html = "<br/>";
	columnsToExclude = ["OpponentId", "Date", "GameId", "Result", "Opponent", "ThisTeam"];
	html += "<table id='vsOpponent'>";
	html += getTableHeader(json[0], columnsToExclude);

	for(let i=0; i<json.length; i++) {
		let row = json[i];
		let teamLink;

		if(row.Date == null) {
			teamLink = plus;
			teamLink += "<a href='/teams/team/" + row.OpponentId + "/history'>" + row.Team + "</a>";

			wins += row.Wins;
			losses += row.Losses;

			html += "<tr class='parent'>"
			html += "<td>" + teamLink + "</td><td>" + row.Wins + "</td><td>" + row.Losses + "</td><td>" + row.Pct +"</td></tr>";
		} else {
			let date = new Date(row.Date);
			let year = date.getFullYear();
			let thisTeamLink = `<a href='/teams/team/${teamId}/year/${year}'>${row.ThisTeam}</a>`
				let opponentLink = `<a href='/teams/team/${row.OpponentId}/year/${year}'>${row.Opponent}</a>`

			html +=
				`<tr class='child'>
					<td>&nbsp;&nbsp;&nbsp;&nbsp; <a href='/games/game/${row.GameId}/boxscore'>${row.Date}</a></td>
					<td>${thisTeamLink}</td>
					<td>${opponentLink}</td>
					<td>${row.Result}</td>
				</tr>`;
		}
	}

	// add total wins, losses, pct to last table row
	let pct = +(Math.round(wins/(wins + losses) + "e+2")  + "e-2");
	html += "<tr><td>&nbsp;</td><td><b>" + wins + "</b></td><td><b>" + losses + "</b></td><td><b>" + pct + "</b></td>";
	html += "</table><br/>";
	document.getElementById('vsOpponentTableDiv').innerHTML = html;

	//event handler for expand/collapse rows
	$("#vsOpponent").on("click", "img", function(e) {
	    e.preventDefault();
	    $(this).closest("tr").nextUntil(".parent").toggleClass("child");

	    let src = $(this).attr('src');
	    let newsrc = (src == '/images/plus.png') ? '/images/minus.png' : '/images/plus.png';
	    $(this).attr('src', newsrc );
	});
}

function setYearAvgsTables() {
	const offenseAvg = /*[[${yearAvgOffense}]]*/ null;
	const defenseAvg = /*[[${yearAvgDefense}]]*/ null;

	let json = JSON.parse(offenseAvg);
	let columnsToExclude = ["TeamId"];
	let html = "";

	html += getTableHeaderSortableExt(json[0], columnsToExclude);  // new function here
	document.getElementById("yearAvgOffenseTable").tHead.innerHTML = html;
	setYearAvgsTableData("yearAvgOffenseTable", json, columnsToExclude);
	makeTableSortable("yearAvgOffenseTable", json, 1);

	json = JSON.parse(defenseAvg);
	html = getTableHeaderSortableExt(json[0], columnsToExclude);  // new function here
	document.getElementById("yearAvgDefenseTable").tHead.innerHTML = html;
	setYearAvgsTableData("yearAvgDefenseTable", json, columnsToExclude);
	makeTableSortable("yearAvgDefenseTable", json, 0);
}

function setYearAvgsTableData(table, json, columnsToExclude) {
	let html = "";
	for(i=0; i<json.length; i++) {
		let row = json[i];
		let yearLink = `<a href='/teams/team/${teamId}/year/${row.Year}'>${row.Year}</a>`;
		let columnLinks = {
			Year : yearLink
		}

		html += getTableRow(row, columnsToExclude, columnLinks);
	}

	document.getElementById(table).getElementsByTagName('tbody')[0].innerHTML = html;
}

function setPlayerTables() {
	//player data by year
	const playerPassing = /*[[${playerPassing}]]*/ null;
	const playerRushing = /*[[${playerRushing}]]*/ null;
	const playerReceiving = /*[[${playerReceiving}]]*/ null;

	let json = JSON.parse(playerPassing);
	setPlayerTableHeader("passingTable", json);
	setTableBody("passingTable", json);

	json = JSON.parse(playerRushing);
	setPlayerTableHeader("rushingTable", json);
	setTableBody("rushingTable", json);

	json = JSON.parse(playerReceiving);
	setPlayerTableHeader("receivingTable", json);
	setTableBody("receivingTable", json);
}

// radio button onclick for year or career
function changePlayerData(table, radioValue) {
	//player data by year
	const playerPassing = /*[[${playerPassing}]]*/ null;
	const playerRushing = /*[[${playerRushing}]]*/ null;
	const playerReceiving = /*[[${playerReceiving}]]*/ null;

	//player career data, i.e. grouped by career instead of season
	const playerPassingCareer = /*[[${playerPassingCareer}]]*/ null;
	const playerRushingCareer = /*[[${playerRushingCareer}]]*/ null;
	const playerReceivingCareer = /*[[${playerReceivingCareer}]]*/ null;

	let json;

	if(table == "passingTable") {
		json = radioValue == "year" ? playerPassing : playerPassingCareer;
	}
	if(table == "rushingTable") {
		json = radioValue == "year" ? playerRushing : playerRushingCareer;
	}
	if(table == "receivingTable") {
		json = radioValue == "year" ? playerReceiving : playerReceivingCareer;
	}

	json = JSON.parse(json);

	setPlayerTableHeader(table, json);
	setTableHeaderColor();
	setTableBody(table, json);
}

function setPlayerTableHeader(table, json) {
	const columnsToExclude = ["PlayerId", "Team", "TeamId"];
	let html = "";
	html += getTableHeaderSortableExt(json[0], columnsToExclude);  // new function here

	document.getElementById(table).tHead.innerHTML = html;
	makeTableSortable(table, json, 1);
}

function setTableBody(table, json) {
	const columnsToExclude = ["PlayerId", "Team", "TeamId"];
	let html = "";
	for(let i=0; i<json.length; i++) {
		let row = json[i];
		let yearLink = `<a href='/teams/team/${teamId}/year/${row.Year}'>${row.Year}</a>`;
		let nameLink = `<a href='/players/player/${row.PlayerId}'>${row.Name}</a>`;
		let columnLinks = {
			Year : yearLink,
			Name : nameLink
		}

		html += getTableRow(row, columnsToExclude, columnLinks);
	}

	document.getElementById(table).getElementsByTagName('tbody')[0].innerHTML = html;
}

function setRecruiting() {
	const teamRecruiting = /*[[${teamRecruiting}]]*/ null;
	const playerRecruiting = /*[[${playerRecruiting}]]*/ null;
	let teamJson = JSON.parse(teamRecruiting);
	let playerJson = JSON.parse(playerRecruiting);

	let html = "<br/><table>";

	//set team header
	const teamColumnsToExclude = ["TeamId", "Team"];
	let teamHeader = getTableHeader(teamJson[0], teamColumnsToExclude, null);

	//set player header
	const playerColumnsToExclude = ["Year"];
	let playerHeader = getTableHeader(playerJson[0], playerColumnsToExclude, null);

	for(let i=0; i<teamJson.length; i++) {
		let teamYearRow = teamJson[i];
		html += teamHeader;
		html += getTableRow(teamYearRow, teamColumnsToExclude, "");
		html += playerHeader;

		for(let j=0; j<playerJson.length; j++) {
			let playerRow = playerJson[j];
			if(playerRow.Year == teamYearRow.Year) {
				html += getTableRow(playerRow, playerColumnsToExclude, "");
			}
		}
	}
	html += "</table><br/>";
	document.getElementById("recruitingTableDiv").innerHTML = html;
}

function isValidData(data) {
	let result = 0;
	if(data === null) {return result;}
	if (data === undefined || data.length == 0) {return result;}
	if(data == "[]") {return result;}

	return 1;
}

function setTableHeaderColor() {
	if(teamColor == "") {
		return;
	}
	$("table th").css({"background-color": teamColor});
}

function setYearLinks() {
	let teamYearsDiv = document.getElementById("teamYears");
	let html = "";
	let MAX_YEAR = getMaxYear();

	for(let i=MAX_YEAR; i>=2001; i--) {
		let url = `/teams/team/${teamId}/year/${i}`;
		html += `<a href='${url}'>${i}</a>`;
	}
	teamYearsDiv.innerHTML = html;
}

function tabClick(tab) {
	let tabs = document.getElementById("tabs").children;
	let tabContents = document.getElementsByClassName("tabcontent");

	for(let i=0; i<tabs.length; i++) {
		if(tab.id == tabs[i].id) {
			tabs[i].style.backgroundColor = teamColor;
			tabContents[i].style.display = "table";
		} else {
			tabs[i].style.backgroundColor = "#999999";
			tabContents[i].style.display = "none";
		}
	}
}

function sortTable(table, col, json, sortOrder) {
	let stats = sortByKey(json, col, sortOrder);
	setTableBody(table, stats);
}

function sortByKey(array, key, sortOrder) {
    return array.sort(function(a, b) {
    	let x = a[key];
    	let y = b[key];
        if(sortOrder == null || sortOrder == 1) {
            return ((x < y) ? 1 : ((x > y) ? -1 : 0));    // descending
        } else {
        	return ((x > y) ? 1 : ((x < y) ? -1 : 0));    // ascending
        }
    });
}

function makeTableSortable(table, json, sortOrder) {

	$(`#${table}`).on("click", "th", function(event) {
		let col = $(this).text();

	    //reset the table header background and text colors
	    $(`#${table} th`).css("background-color", teamColor);
	    $(`#${table} th`).css("color", "white");

 	    //change the selected header's background and text colors
	    $(this).css("background-color","#ffcb05"); // maize
	    $(this).css("color", "#00274c"); // blue

	  	sortTable(table, col, json, sortOrder);
	});
}
