<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<title th:text="${title}"> College Football Data - Stats</title>

<meta charset="ISO-8859-1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFB Geek college football stats index</title>
<meta name="description" content="College Football Data stats">
<meta name="author" content="John Gilliam">

<link href="/css/navbar.css" rel="stylesheet">
<style type="text/css">

html { 
    height: 100%;
}
body { 
    min-height: 100%;
    margin: 0px;
}

.divMain {
	display: block;
	margin: auto;
    width: 80%;
    /*   fixed menu chnage on next line */
	margin-top: 30px;
}
.divTable {
	display: table;
	width: 100%;	
}
.divTableRow {
	display: table-row;
}
.divTableHeading {
	background-color: #EEE;
	display: table-header-group;
}
.divTableCell, .divTableHead {
	/* border: 1px solid #999999; */
	display: table-cell;
	padding: 3px 5px;
	width: 50%;
}
.divTableHeading {
	background-color: #EEE;
	display: table-header-group;
	font-weight: bold;
}
.divTableFoot {
	background-color: #EEE;
	display: table-footer-group;
	font-weight: bold;
}
.divTableBody {
	display: table-row-group;
}

table {
    font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
    font-size: 12px;
    border-collapse: collapse;
    border: 1px solid #ddd;
    width: 100%;
}
table td {
	font-size: 12px;
    /* border: 1px solid #ddd; */
    border-bottom: 1px solid #ddd;
    padding: 2px; 
    padding-left: 4px;
}
table td a {
	color: #06c;
	text-decoration: none;
}
table tr th {
	font-size: 14px;
	font-weight: bold;
    text-align: left;
    background-color: #00274c;
    font-style: normal;
    color: white;
}
table thead tr th:not(.no-sort) {
    position: relative;
    cursor: pointer;
}
table thead tr th:after {
    position: absolute;
    right: 2px;
}
table thead tr th.sort-asc:after {
    content: "\25b4";
}
table thead tr th.sort-desc:after {
    content: "\25be";
}
h1 {
	font-size: 20px;
	font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
}
h3 {
	font-size: 14px;
	font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
}

label {
    font-size: 16px;
   	font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
    font-weight: bold;
    font-style: normal;
    padding-right: 5px;
}

#statTable th:hover {
	background-color: grey;
	cursor: pointer;
}

#statTable tr:hover {
	background-color: lightgray;
}

#statTable {
	table-layout: fixed;
	width: 80%;
}

#statTable th:nth-child(1) {
	width: 10%;
}

</style>
</head>

<body onload="setTableHeader(); setTableBody(); setYearOptions(); makeTableSortable()">
	
	<!-- 
	<p th:text="'year= ' + ${year} "/>
	<p th:text="'stats= ' + ${stats} "/>	
	<p th:text="'sortOrder= ' + ${sortOrder} "/>
	-->

<div class="navbar">
	<a href="/">CFB GEEK</a> 
	<a href="/teams">Teams</a>
	<a href="#" onclick="gotoYearSchedule(year)">Schedule</a>
	<a href="#" onclick="gotoYearStats(year)">Stats</a>
	<a href="#" onclick="gotoYearRankings(year)">Rankings</a>	
	<a href="#" onclick="gotoYearRecruiting(year)">Recruiting</a>
</div>

<br />

<div class="divMain">
	<div class="divTable">
		<div class="divTableBody">
			<div class="divTableRow">
				<div class="divTableCell">
					<h1 th:text="${title}"></h1>
				</div>
			</div>
			<div class="divTableRow">
				<div class="divTableCell" id="yearDiv">
					<label for="yearSelector">Year:</label>
					<select id="yearSelector" onchange="changeYear(this.value)">
					</select>
				</div>
			</div>
			<br />
			<div class="divTableRow">
				<div class="divTableCell" id="statsDiv">
				<table id = 'statTable'>
					<thead></thead>
					<tbody></tbody>
				</table>	
				</div>
			</div>
		</div>
	</div>
</div>
<br><br>

<script th:inline="javascript">

var year = /*[[${year}]]*/ null;
var title = /*[[${title}]]*/ null;
var stats = /*[[${stats}]]*/ null;
var json = JSON.parse(stats); 
var sortOrder = /*[[${sortOrder}]]*/ null;
var columnsToExclude = ["Year", "TeamId", "PlayerId", "GameId", "HomeTeamId", "VisitorTeamId", "WinnerId", "LoserId"];

function setTableHeader() {
	$('#statTable thead').append(getTableHeaderSortableExt(json[0], columnsToExclude));
	$('#statTable thead').append('</tr>');
}

function setTableBody() {
	var teamLink = "";
	
	$('#statTable tbody').empty();
	for(var i=0; i<json.length; i++) {
		var row = json[i];
		
		if(year == null) {
			teamLink = `<a href='/teams/team/${row.TeamId}/history'>${row.Team}</a>`;
		} else {
			teamLink = `<a href='/teams/team/${row.TeamId}/year/${year}'>${row.Team}</a>`;
		}
		var gameLink = `<a href='/games/game/${row.GameId}/boxscore'>${row.Date}</a>`;
		var visitorLink = `<a href='/teams/team/${row.VisitorTeamId}/year/${row.Year}'>${row.Visitor}</a>`;
		var homeLink = `<a href='/teams/team/${row.HomeTeamId}/year/${row.Year}'>${row.Home}</a>`;
		
		var playerLink = `<a href='/players/player/${row.PlayerId}'>${row.Name}</a>`; 
		var columnLinks = {
			Team : teamLink,
			Name : playerLink,
			Date : gameLink,
			Visitor : visitorLink,
			Home : homeLink
		}

		rowContent = getTableRow(row, columnsToExclude, columnLinks, i+1);
		$('#statTable tbody').append(rowContent);
	}	
	$('#statTable tbody').append('</tbody>')
}

function makeTableSortable() {
	$("#statTable").on("click", "thead tr th", function(e) {
		var dir = ($(this).hasClass("sort-asc")) ? 1 : 0;

		$("#statTable").find("thead tr th").removeClass("sort-asc").removeClass("sort-desc");
		$("#statTable").find("thead tr th").css("background-color", "#00274c" );
		$("#statTable").find("thead tr th").css("color", "white" );

	    sortByKey(json, this.textContent, dir)
	   	setTableBody();
	    
	    if(dir == 1) {
	    	$(this).addClass("sort-desc");
	    } else {
	    	$(this).addClass("sort-asc");
	    }
	    $(this).css("background-color","#ffcb05"); // maize
	    $(this).css("color", "#00274c"); // blue 
	});
}

function sortByKey(array, key, dir) {	
    return array.sort(function(a, b) {
        var x = a[key]; 
        var y = b[key];
        if(dir == null || dir == 1) {
            return ((x < y) ? 1 : ((x > y) ? -1 : 0));    // descending
        } else {
        	return ((x > y) ? 1 : ((x < y) ? -1 : 0));    // ascending
        }
    });
}

function setYearOptions() {
	var maxYear = getMaxYear();
	var minYear = getMinYear();
	var yearOptions = "";
	
	//hide the year selector (div = yearDiv) if the url does not contain "year"
	var url = window.location.href;
	if(!url.includes("year")) {
		document.getElementById("yearDiv").style.display = "none";
		return;
	}
	
	for(maxYear; maxYear>=minYear; maxYear--) {
		var selected = (maxYear == year ? "selected" : "");
		yearOptions += `<option value="${maxYear}" ${selected}>${maxYear}</option>`;
	}
	
	if(document.getElementById("yearSelector") != null) {
		document.getElementById("yearSelector").innerHTML += yearOptions;
	}
}

function changeYear(selectedYear) {
	var currentUrl = window.location.href;
	var hash = window.location.hash;
	var newYear = "/year/" + selectedYear;
	var newUrl = currentUrl.replace("/year/" + year, newYear).replace(hash, "");
	
	window.location = newUrl;
}

</script>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

<script type="text/javascript" th:src="@{/js/navbar.js}"></script>
<script type="text/javascript" th:src="@{/js/table.js}"></script>
<script type="text/javascript" th:src="@{/js/yearChoices.js}"></script>
</body>
</html>
