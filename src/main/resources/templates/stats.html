<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${title}">CFB Geek college football stats</title>
<meta name="description" content="College Football Data stats">
<meta name="author" content="John Gilliam">

<link href="/css/navbar.css" rel="stylesheet">
<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--accent-hover: #ffd633;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 6px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--shadow-hover: 0 8px 24px rgba(16, 24, 40, 0.12);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html {
	height: 100%;
}

body {
	min-height: 100%;
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.0;
}

a {
	color: var(--link);
	text-decoration: none;
	transition: color 0.15s ease;
}

a:hover {
	color: var(--brand-navy);
}

/* ---- Hero ---- */
.hero {
	background: var(--bg);
	color: #000;
	padding: 18px 24px;
	text-align: center;
}

.hero h1 {
	margin: 0;
	font-size: clamp(22px, 4vw, 32px);
	font-weight: 700;
	letter-spacing: -0.5px;
}

/* ---- Layout ---- */
.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 24px 24px 64px;
}

/* ---- Controls / filters ---- */
.controls {
	display: flex;
	flex-wrap: wrap;
	align-items: center;
	gap: 10px;
	margin-bottom: 20px;
}

.controls label {
	font-size: 15px;
	font-weight: 700;
	color: var(--text);
}

.controls select {
	font-family: var(--font);
	font-size: 14px;
	color: var(--text);
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: 8px;
	padding: 8px 12px;
	box-shadow: var(--shadow);
	cursor: pointer;
	transition: border-color 0.15s ease;
}

.controls select:hover,
.controls select:focus {
	border-color: var(--brand-navy);
	outline: none;
}

/* ---- Table ---- */
.table-wrap {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	overflow: hidden;
}

table {
	font-family: var(--font);
	font-size: 13px;
	border-collapse: collapse;
	width: 100%;
	border: none;
}

table td {
	font-size: 13px;
	border-bottom: 1px solid var(--border);
	padding: 8px 10px;
	vertical-align: middle;
}

table td a {
	color: var(--link);
	font-weight: 600;
}

table tr th {
	font-size: 13px;
	font-weight: 800;
	letter-spacing: 0.02em;
	text-align: left;
	background-color: var(--brand-navy);
	color: #fff;
	padding: 10px;
}

/* Sortable header affordances */
table thead tr th:not(.no-sort) {
	position: relative;
	cursor: pointer;
}
table thead tr th:after {
	position: absolute;
	right: 4px;
}
table thead tr th.sort-asc:after {
	content: "\25b4";
}
table thead tr th.sort-desc:after {
	content: "\25be";
}

#statTable th:hover {
	background-color: var(--brand-navy-light);
	cursor: pointer;
}

#statTable tbody tr:hover {
	background-color: #eef2f7;
}

#statTable {
	width: 100%;
}

/* First column (row rank) shrinks to fit its content for any dataset */
#statTable th:nth-child(1),
#statTable td:nth-child(1) {
	width: 1%;
	white-space: nowrap;
}

@media (max-width: 600px) {
	.container {
		padding: 20px 14px 48px;
	}
}
</style>
</head>

<body onload="setTableHeader(); setTableBody(); setYearOptions(); makeTableSortable()">

<div class="navbar">
	<a href="/">CFB GEEK</a>
	<a href="/teams">Teams</a>
	<a href="#" onclick="gotoYearSchedule(year)">Schedule</a>
	<a href="#" onclick="gotoYearStats(year)">Stats</a>
	<a href="#" onclick="gotoYearRankings(year)">Rankings</a>
	<a href="#" onclick="gotoYearRecruiting(year)">Recruiting</a>
</div>

<header class="hero">
	<h1 th:text="${title}"></h1>
</header>

<main class="container">

	<div class="controls" id="yearDiv">
		<label for="yearSelector">Year:</label>
		<select id="yearSelector" onchange="changeYear(this.value)"></select>
	</div>

	<div class="table-wrap" id="statsDiv">
		<table id="statTable">
			<thead></thead>
			<tbody></tbody>
		</table>
	</div>

</main>

<script th:inline="javascript">

let year = /*[[${year}]]*/ null;
let title = /*[[${title}]]*/ null;
let stats = /*[[${stats}]]*/ null;
let json = JSON.parse(stats);
let sortOrder = /*[[${sortOrder}]]*/ null;
let columnsToExclude = ["Year", "TeamId", "PlayerId", "GameId", "HomeTeamId", "VisitorTeamId", "WinnerId", "LoserId"];

function setTableHeader() {
	$('#statTable thead').append(getTableHeaderSortableExt(json[0], columnsToExclude));
	$('#statTable thead').append('</tr>');
}

function setTableBody() {
	let teamLink = "";

	$('#statTable tbody').empty();
	for(let i=0; i<json.length; i++) {
		let row = json[i];

		if(year == null) {
			teamLink = `<a href='/teams/team/${row.TeamId}/history'>${row.Team}</a>`;
		} else {
			teamLink = `<a href='/teams/team/${row.TeamId}/year/${year}'>${row.Team}</a>`;
		}
		let gameLink = `<a href='/games/game/${row.GameId}/boxscore'>${row.Date}</a>`;
		let visitorLink = `<a href='/teams/team/${row.VisitorTeamId}/year/${row.Year}'>${row.Visitor}</a>`;
		let homeLink = `<a href='/teams/team/${row.HomeTeamId}/year/${row.Year}'>${row.Home}</a>`;

		let playerLink = `<a href='/players/player/${row.PlayerId}'>${row.Name}</a>`;
		let columnLinks = {
			Team : teamLink,
			Name : playerLink,
			Date : gameLink,
			Visitor : visitorLink,
			Home : homeLink
		}

		rowContent = getTableRow(row, columnsToExclude, columnLinks, i+1);
		$('#statTable tbody').append(rowContent);
	}
	$('#statTable tbody').append('</tbody>')
}

function makeTableSortable() {
	$("#statTable").on("click", "thead tr th", function(e) {
		let dir = ($(this).hasClass("sort-asc")) ? 1 : 0;

		$("#statTable").find("thead tr th").removeClass("sort-asc").removeClass("sort-desc");
		$("#statTable").find("thead tr th").css("background-color", "#00274c" );
		$("#statTable").find("thead tr th").css("color", "white" );

	    sortByKey(json, this.textContent, dir)
	   	setTableBody();

	    if(dir == 1) {
	    	$(this).addClass("sort-desc");
	    } else {
	    	$(this).addClass("sort-asc");
	    }
	    $(this).css("background-color","#ffcb05"); // maize
	    $(this).css("color", "#00274c"); // blue
	});
}

function sortByKey(array, key, dir) {
    return array.sort(function(a, b) {
        let x = a[key];
        let y = b[key];
        if(dir == null || dir == 1) {
            return ((x < y) ? 1 : ((x > y) ? -1 : 0));    // descending
        } else {
        	return ((x > y) ? 1 : ((x < y) ? -1 : 0));    // ascending
        }
    });
}

function setYearOptions() {
	let maxYear = getMaxYear();
	let minYear = getMinYear();
	let yearOptions = "";

	//hide the year selector (div = yearDiv) if the url does not contain "year"
	let url = window.location.href;
	if(!url.includes("year")) {
		document.getElementById("yearDiv").style.display = "none";
		return;
	}

	for(maxYear; maxYear>=minYear; maxYear--) {
		let selected = (maxYear == year ? "selected" : "");
		yearOptions += `<option value="${maxYear}" ${selected}>${maxYear}</option>`;
	}

	if(document.getElementById("yearSelector") != null) {
		document.getElementById("yearSelector").innerHTML += yearOptions;
	}
}

function changeYear(selectedYear) {
	let currentUrl = window.location.href;
	let hash = window.location.hash;
	let newYear = "/year/" + selectedYear;
	let newUrl = currentUrl.replace("/year/" + year, newYear).replace(hash, "");

	window.location = newUrl;
}

</script>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

<script type="text/javascript" th:src="@{/js/navbar.js}"></script>
<script type="text/javascript" th:src="@{/js/table.js}"></script>
<script type="text/javascript" th:src="@{/js/yearChoices.js}"></script>
</body>
</html>
