<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFB Geek college football team data</title>
<meta name="description" content="College Football Data Team History">
<meta name="author" content="John Gilliam">

<link href="/css/navbar.css" rel="stylesheet">
<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--accent-hover: #ffd633;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 12px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--shadow-hover: 0 8px 24px rgba(16, 24, 40, 0.12);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html {
	height: 100%;
}

body {
	min-height: 100%;
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.0;
}

a {
	color: var(--link);
	text-decoration: none;
/* 	transition: color 0.15s ease; */
}

a:hover {
	color: var(--brand-navy);
}

/* ---- Layout ---- */
.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 24px 24px 64px;
}

h1 {
	font-size: clamp(20px, 3vw, 26px);
	margin: 0 0 4px;
}

h3 {
	font-size: 14px;
	font-weight: 600;
	color: var(--text-muted);
	margin: 0 0 12px;
}

/* ---- Team header + schedule panels ---- */
.panel-row {
	display: flex;
	flex-wrap: wrap;
	gap: 20px;
	margin-bottom: 24px;
}

.panel {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	overflow: hidden;
}

#teamDetails {
	flex: 1 1 100%;
	width: 100%;
	text-align: center;
	padding: 20px 24px;
}

#teamDetails img {
	height: 75px;
	width: 75px;
	object-fit: contain;
}


/* ---- Tabs ---- */
.tab {
	display: flex;
	overflow: hidden;
	font-family: var(--font);
}

.tab button {
	background-color: #999999;
	border: none;
	outline: none;
	cursor: pointer;
	padding: 10px 18px;
	border-top-left-radius: 10px;
	border-top-right-radius: 10px;
	font-family: var(--font);
	font-size: 14px;
	font-weight: 700;
	color: #fff;
	text-decoration: none;
/* 	transition: background-color 0.15s ease; */
}

.tab button:hover {
	background-color: var(--brand-navy-light);
}

/* ---- Tab content panels ---- */
.tabcontent {
	display: none;
	width: 100%;
	padding: 18px;
	background: var(--surface);
	border: 1px solid var(--border);
	border-top: none;
	border-bottom-left-radius: var(--radius);
	border-bottom-right-radius: var(--radius);
	border-top-right-radius: var(--radius);
	box-shadow: var(--shadow);
}

.tabcontent.is-active {
	display: block;
}

/* spacing between stacked stat tables within a tab */
.tabcontent.is-active > div + div {
	margin-top: 16px;
}

/* ---- Tables ---- */
table {
	font-family: var(--font);
	font-size: 13px;
	border-collapse: collapse;
	width: 100%;
	border: none;
	border-top-left-radius: var(--radius);
	border-top-right-radius: var(--radius);
	overflow: hidden;
}

table td {
	font-size: 13px;
	border-bottom: 1px solid var(--border);
	padding: 8px 10px;
	vertical-align: middle;
}

table td:first-child {
	border-left: 1px solid var(--border);
}

table td:last-child {
	border-right: 1px solid var(--border);
}

table td a {
	color: var(--link);
	font-weight: 600;
}

table th {
	font-size: 13px;
	font-weight: 800;
	letter-spacing: 0.02em;
	text-align: left;
	background-color: var(--brand-navy);
	color: #fff;
	padding: 10px;
}

table tr:hover {
	background-color: #eef2f7;
}

@media (max-width: 600px) {
	.container {
		padding: 20px 14px 48px;
	}
}
</style>
</head>
<body onload="setYearLinks(); setTeamDetails(); setScheduleResultsTable(); setStatTables(); setTableHeaderColor();">

	<div class="navbar">
		<a href="/">CFB GEEK</a>
		<a href="/teams">Teams</a>
		<a href="#" onclick="gotoYearSchedule(year)">Schedule</a>
		<a href="#" onclick="gotoYearStats(year)">Stats</a>
		<div class="dropdown">
			<button class="dropbtn">Year<i class="fa fa-caret-down"></i>
			</button>
			<div class="dropdown-content" id="teamYears">
			</div>
		</div>
		<a href="#" onclick="gotoYearRankings(year)">Rankings</a>
		<a href="#" onclick="gotoYearRecruiting(year)">Recruiting</a>
	</div>

	<main class="container">

		<div class="panel-row">
			<div class="panel" id="teamDetails"></div>
		</div>

		<div class="tab" id="tabs">
			<button onclick="tabClick(this)" id="scheduleTab">Schedule</button>
			<button onclick="tabClick(this)" id="teamTab">Team</button>
			<button onclick="tabClick(this)" id="playerTab">Player</button>
		</div>

		<div class="tabcontent is-active" id="scheduleDiv">
			<div id="scheduleResultsDiv"></div>
		</div>

		<div class="tabcontent" id="teamDiv">
			<div id="teamScoringDiv"></div>
			<div id="teamYardsDiv"></div>
			<div id="teamDownSuccessRateDiv"></div>
			<div id="teamPassingDiv"></div>
			<div id="teamRushingDiv"></div>
			<div id="team3rdDownsDiv"></div>
			<div id="teamTurnoverMarginDiv"></div>
			<div id="teamSos"></div>
		</div>

		<div class="tabcontent" id="playerDiv">
			<div id="playerPassingDiv"></div>
			<div id="playerRushingDiv"></div>
			<div id="playerReceivingDiv"></div>
			<div id="playerDefenseDiv"></div>
			<div id="playerIntsDiv"></div>
			<div id="playerKickReturnsDiv"></div>
			<div id="playerPuntReturnsDiv"></div>
			<div id="playerPuntingDiv"></div>
			<div id="playerKickingDiv"></div>
		</div>
	</main>

<script th:inline="javascript">
const teamYearRecord = /*[[${teamYearRecord}]]*/ null;
const scheduleResults = /*[[${scheduleResults}]]*/ null;
const teamOpponentRecord = /*[[${teamOpponentRecord}]]*/ null;
const year = /*[[${year}]]*/ null;
const teamId = /*[[${teamId}]]*/ null;
let teamName = "";
let teamColor = "";

function setTeamDetails() {
	let json = JSON.parse(teamYearRecord);
	teamName = json[0].Name;
	let mascot = json[0].Mascot;
	let record = json[0].Record;
	//let rank = json[0].Rank == null ? "" : "#" + json[0].Rank;
	let rank = json[0].ranking == null ? "" : "#" + json[0].ranking;
	teamColor = json[0].Color != "" ? "#" + json[0].Color : "";

	let html = "";

	html += "<h1>" + year + " " + rank + " " + teamName + " " + mascot + " (" + record + ") </h1>" ;
	html += "<h3>through: " + json[0].Date + "</h3>";
	html += `<img src='https://a.espncdn.com/i/teamlogos/ncaa/500/${teamId}.png' alt='${teamName} logo' height='125' width='125'>`;

	document.getElementById('teamDetails').innerHTML = html;
	document.title = teamName + " " + year;
}

function setScheduleResultsTable() {
	let json = JSON.parse(scheduleResults);
	let tableColumns = ["Date", "Opponent", "Result"];
	let html = "";

	//set table header
	const columnsToExclude = ["GameId", "sqldate", "HomeTeamId", "AwayTeamId"];
	html += "<table>";
	html += getTableHeader(json[0], columnsToExclude);

	//add row data
	for(i=0; i<json.length; i++) {
		let row = json[i];
		let opponentId = teamId == row.HomeTeamId ? row.AwayTeamId : row.HomeTeamId;
		let opponentLink = `<a href='/teams/team/${opponentId}/year/${year}'>${row.Opponent}</a>`;
		let linkPage = (row.Result == "TBD") ? "gamepreview" : "boxscore";
		let gameLink = `<a href='/games/game/${row.GameId}/${linkPage}'>${row.Date}</a>`;

		let columnLinks = {
			Date : gameLink,
			Opponent : opponentLink,
		}

		html += getTableRow(row, columnsToExclude, columnLinks);
	}
	html += "</table>";

	document.getElementById('scheduleResultsDiv').innerHTML = html;
}

function setStatTables() {

	//TEAM

	let stat =  /*[[${teamScoring}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Scoring", "teamScoringDiv");

	stat =  /*[[${teamYards}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Total Yards", "teamYardsDiv");

	stat =  /*[[${teamDownSuccessRate}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Team Down Play Success (Rankings from first to worst)", "teamDownSuccessRateDiv");

	stat =  /*[[${teamPassing}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Passing", "teamPassingDiv");

	stat =  /*[[${teamRushing}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Rushing", "teamRushingDiv");

	stat =  /*[[${team3rdDowns}]]*/ null;
	setTeamPlayerStatTable(stat, "", "3rd Down Conversion", "team3rdDownsDiv");

	stat =  /*[[${teamTurnoverMargin}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Turnover Margin", "teamTurnoverMarginDiv");

	stat =  /*[[${teamSos}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Team Strength of Schedule", "teamSos");

	// PLAYERS

	stat =  /*[[${playerPassing}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Passing", "playerPassingDiv");

	stat = /*[[${playerRushing}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Rushing", "playerRushingDiv");

	stat = /*[[${playerReceiving}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Receiving", "playerReceivingDiv");

	stat = /*[[${playerDefense}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Defense", "playerDefenseDiv");

	stat = /*[[${playerInts}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Interceptions", "playerIntsDiv");

	stat = /*[[${playerKickReturns}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Kick Returns", "playerKickReturnsDiv");

	stat = /*[[${playerPuntReturns}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Punt Returns", "playerPuntReturnsDiv");

	stat = /*[[${playerPunting}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Punting", "playerPuntingDiv");

	stat = /*[[${playerKicking}]]*/ null;
	setTeamPlayerStatTable(stat, "", "Kicking", "playerKickingDiv");
}

function isValidData(data) {
	let result = 0;
	if(data === null) {return result;}
	if (data === undefined || data.length == 0) {return result;}
	if(data == "[]") {return result;}

	return 1;
}

function setTableHeaderColor() {
	if(teamColor == "") {
		return;
	}

	let tableHeaders = document.getElementsByTagName("th");
	for(let i=0; i<tableHeaders.length; i++) {
		let tableHeader = tableHeaders[i];
		tableHeader.style.backgroundColor = teamColor;
	}

	//tabs - Schedule is active by default
	document.getElementById("scheduleTab").style.backgroundColor = teamColor;
	document.getElementById("teamTab").style.backgroundColor = "#999999";
	document.getElementById("playerTab").style.backgroundColor = "#999999";
}

function setYearLinks() {
	let teamYearsDiv = document.getElementById("teamYears");
	let currentYear = "/year/" + year;
	let html = "";
	let MAX_YEAR = getMaxYear();

	html += `<a href='/teams/team/${teamId}/history'>History</a>`;

	for(let i=MAX_YEAR; i>=2001; i--) {
		let newYear = "/year/" + i;
		let currentUrl = window.location.href;
		let link = currentUrl.replace(currentYear, newYear);
		html += `<a href='${link}'>${i}</a>`;
	}
	teamYearsDiv.innerHTML = html;
}

function tabClick(tab) {
	//map each tab button to its content panel
	const tabMap = {
		scheduleTab : "scheduleDiv",
		teamTab : "teamDiv",
		playerTab : "playerDiv"
	};

	for(let tabId in tabMap) {
		let isActive = (tab.id == tabId);
		document.getElementById(tabMap[tabId]).classList.toggle("is-active", isActive);
		document.getElementById(tabId).style.backgroundColor = isActive ? teamColor : "#999999";
	}
}

</script>

<script type="text/javascript" th:src="@{/js/navbar.js}"></script>
<script type="text/javascript" th:src="@{/js/table.js}"></script>
<script type="text/javascript" th:src="@{/js/yearChoices.js}"></script>
</body>
</html>
