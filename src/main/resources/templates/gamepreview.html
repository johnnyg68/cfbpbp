<script th:inline="javascript">

var homeTeamName;
var homeTeamAbbr;
var homeTeamId;
var visitorTeamName;
var visitorTeamAbbr;
var visitorTeamId;
var year = /*[[${year}]]*/ null;

function setBannerAndTitle() {
	
	var gameHeader = /*[[${gamePreviewHeader}]]*/ null;
	var gameHeaderParsed = JSON.parse(gameHeader);
	var game = gameHeaderParsed[0];
	
	var site = (game.Site == 'NEUTRAL') ? 'vs' : 'at';

	var visitorUrl = "/teams/team/" + game.VisitorTeamId + "/year/" + game.Year;
	var homeUrl = "/teams/team/" + game.HomeTeamId + "/year/" + game.Year;	
	var visitorLogo = `<img src='http://a.espncdn.com/i/teamlogos/ncaa/500/${game.VisitorTeamId}.png' height='50' width='50'>`;
	var homeLogo = `<img src='http://a.espncdn.com/i/teamlogos/ncaa/500/${game.HomeTeamId}.png' height='50' width='50'>`;
	var homeTeamRank = (game.HomeTeamRank == null) ? "" : "#" + game.HomeTeamRank;
	var visitorTeamRank = (game.VisitorTeamRank == null) ? "" : "#" + game.VisitorTeamRank;
	var homeTeamRecord = (game.HomeTeamRecord == null) ? "" : "(" + game.HomeTeamRecord + ")";
	var visitorTeamRecord = (game.VisitorTeamRecord == null) ? "" : "(" + game.VisitorTeamRecord + ")";
	var visitorTeamMascot = game.VisitorTeamMascot;
	var homeTeamMascot = game.HomeTeamMascot;
	
	//set globals for use by setBoxscoreTable()
	homeTeamName = game.HomeTeamName;
	homeTeamAbbr = game.HomeTeamAbbreviation;
	homeTeamId = game.HomeTeamId;
	visitorTeamName = game.VisitorTeamName;
	visitorTeamAbbr = game.VisitorTeamAbbreviation;
	visitorTeamId = game.VisitorTeamId;
	year = game.Year;
	
	var visitorTeamDetails = visitorTeamRank + " " + visitorTeamName + " " + visitorTeamMascot + " " + visitorTeamRecord;
	var homeTeamDetails = homeTeamRank + " " + homeTeamName + " " + homeTeamMascot + " " + homeTeamRecord; 

	var html = "";
	html += "<table id='bannerTable'>"
	html += `<tr><td align='right'><a href='${visitorUrl}'>${visitorTeamDetails}</a>${visitorLogo}</td>`;
	html +=	"<td align='center'><p>" + site + "</p></td>";
	html += `<td align='left'>${homeLogo}<a href='${homeUrl}'>${homeTeamDetails}</a></td></tr>`;
	html +=	"<tr><td></td><td align='center'><p>" + game.Date + "</td><td></td></tr>";
	html += "</table>";
	
	document.title = game.Title;
	document.getElementById('bannerDiv').innerHTML = html;		
}

function setTeamStats() {
	var awayTeamOffense = /*[[${awayTeamOffense}]]*/ null;
	var homeTeamOffense = /*[[${homeTeamOffense}]]*/ null;
	var awayTeamDefense = /*[[${awayTeamDefense}]]*/ null;
	var homeTeamDefense = /*[[${homeTeamDefense}]]*/ null;
	
	// offense for both teams 
	var html = "<h3>Team Offense Stats</h3>";
 	html += "<table><tr>";
	html += "<th></th><th>" + visitorTeamName + "</th><th>" + homeTeamName + "</th></tr>";
	var awayJson = JSON.parse(awayTeamOffense);
	var homeJson = JSON.parse(homeTeamOffense);
	for(var key in awayJson[0]) {
		if(key == "TeamId" || key == "Team") {continue;} 
		html+= "<tr><td>" + key + "</td><td>" + awayJson[0][key] + "</td><td>" + homeJson[0][key] + "</td></tr>"; 
	} 
	html += "</table";
	document.getElementById('teamOffenseDiv').innerHTML = html; 

	// defense for both teams
	html = "<h3>Team Defense Stats</h3>";
 	html += "<table><tr>";
	html += "<th></th><th>" + visitorTeamName + "</th><th>" + homeTeamName + "</th></tr>";
	awayJson = JSON.parse(awayTeamDefense);
	homeJson = JSON.parse(homeTeamDefense);
	for(var key in awayJson[0]) {
		if(key == "TeamId" || key == "Team") {continue;} 
		html+= "<tr><td>" + key + "</td><td>" + awayJson[0][key] + "</td><td>" + homeJson[0][key] + "</td></tr>"; 
	}
	html += "</table";
	document.getElementById('teamDefenseDiv').innerHTML = html;  
}

function setSeasonResults() {
	var awaySeasonResults = /*[[${awaySeasonResults}]]*/ null;
	var homeSeasonResults = /*[[${homeSeasonResults}]]*/ null;
	
	var json;
	var targetDiv;
	var teamId;
	var teamName;
	
	var teams = [visitorTeamId, homeTeamId];
	
	for(var t=0; t<teams.length; t++) {
		if(teams[t] == visitorTeamId) {
			teamId = visitorTeamId;
			teamName = visitorTeamName;
			json = JSON.parse(awaySeasonResults);
			targetDiv = "awaySeasonResultsDiv";
		} else {
			teamId = homeTeamId;
			teamName = homeTeamName;
			json = JSON.parse(homeSeasonResults);
			targetDiv = "homeSeasonResultsDiv";
		}
		
		var tableColumns = ["Date", "Opponent", "Result"];
		
		//set table header
		var html = "<h3>" + teamName + " Schedule</h3>";
		var columnsToExclude = ["GameId", "HomeTeamId", "AwayTeamId"];
		html += "<table>";
		html += getTableHeader(json[0], columnsToExclude);
		
		//add row data
		for(i=0; i<json.length; i++) {
			var row = json[i];
			var opponentId = teamId == row.HomeTeamId ? row.AwayTeamId : row.HomeTeamId;
			var opponentLink = `<a href='/teams/team/${opponentId}/year/${year}'>${row.Opponent}</a>`;
			var linkPage = (row.Result == "TBD") ? "gamepreview" : "boxscore";
			var gameLink = `<a href='/games/game/${row.GameId}/${linkPage}'>${row.Date}</a>`;
			
			var columnLinks = {
				Date : gameLink,	
				Opponent : opponentLink,
			}
			
			html += getTableRow(row, columnsToExclude, columnLinks);
		}	
		html += "</table>";
		
		document.getElementById(targetDiv).innerHTML = html;
	}
}

function setOdds() {
	var odds = /*[[${odds}]]*/ null;
	var json = JSON.parse(odds);
	var html = "<h3>Odds</h3>"
	html += "<table>";
	
	if(json[0] == undefined) {
		document.getElementById("oddsDiv").innerHTML = "<h3>Odds</h3><br>Data Currently Unavailable."
		return;
	}
	
	html += getTableHeader(json[0]);
	for(var i=0; i<json.length; i++) {
		html += getTableRow(json[i]);
	}
	html += "</table>";
	document.getElementById("oddsDiv").innerHTML = html;
}

function setSpRankings() {
	var spRankings = /*[[${spRankings}]]*/ null;
	var json = JSON.parse(spRankings);
	var html = "<h3>SP+ Rankings</h3>"
	html += "<table>";
	
	if(json[0] == undefined) {
		document.getElementById("spRankingsDiv").innerHTML = "<h3>SP+ Rankings</h3><br>Data Currently Unavailable."
		return;
	}
	
	html += getTableHeader(json[0]);
	for(var i=0; i<json.length; i++) {
		html += getTableRow(json[i]);
	}
	html += "</table>";
	document.getElementById("spRankingsDiv").innerHTML = html;
}

function setGameHistory() {
	var gameHistory = /*[[${gameHistory}]]*/ null;
	var json = JSON.parse(gameHistory);
	
	if(json[0] == undefined) {
		return;
	}
	
	var columnsToExclude = ["GameId", "Year", "WinnerTeamId", "HomeTeamId", "AwayTeamId"];
	
	var html = "<h3>Game History</h3>"
	html += "<table>";
	
	html += getTableHeader(json[0], columnsToExclude);
	
	//add table rows
	for(var i=0; i<json.length; i++) {
		var row = json[i];

		var gameLink = `<a href='/games/game/${row.GameId}/boxscore'>${row.Date}</a>`;
		var winnerTeamHistoryLink = `<a href='/teams/team/${row.WinnerTeamId}/year/${row.Year}'>${row.Winner}</a>`;
		var homeTeamYearLink = `<a href='/teams/team/${row.HomeTeamId}/year/${row.Year}'>${row.Home}</a>`;
		var awayTeamYearLink = `<a href='/teams/team/${row.AwayTeamId}/year/${row.Year}'>${row.Visitor}</a>`;
		
		var columnLinks = {
			Date : gameLink,
			Winner : winnerTeamHistoryLink,
			Home : homeTeamYearLink,
			Visitor : awayTeamYearLink
		}
		
		html += getTableRow(row, columnsToExclude, columnLinks);
	}
	html += "</table>";
	document.getElementById("gameHistoryDiv").innerHTML = html;
}

</script>
