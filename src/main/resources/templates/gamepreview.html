<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>CFB Geek Game Preview</title>
<meta name="description" content="College Football Geek Game Preview">
<meta name="author" content="John Gilliam">

<link href="/css/navbar.css" rel="stylesheet">

<style type="text/css">
:root {
	--brand-navy: #00274c;
	--brand-navy-light: #003a70;
	--accent: #ffcb05;
	--accent-hover: #ffd633;
	--link: #0a66c2;
	--text: #1a1a1a;
	--text-muted: #5a6472;
	--surface: #ffffff;
	--bg: #f4f6f9;
	--border: #e3e8ef;
	--radius: 12px;
	--shadow: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
	--shadow-hover: 0 8px 24px rgba(16, 24, 40, 0.12);
	--font: "Trebuchet MS", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* {
	box-sizing: border-box;
}

html {
	height: 100%;
}

body {
	min-height: 100%;
	margin: 0;
	background-color: var(--bg);
	color: var(--text);
	font-family: var(--font);
	-webkit-font-smoothing: antialiased;
	line-height: 1.55;
}

a {
	color: var(--link);
	text-decoration: none;
	transition: color 0.15s ease;
}

a:hover {
	color: var(--brand-navy);
}

/* ---- Layout ---- */
.container {
	max-width: 1100px;
	margin: 0 auto;
	padding: 24px 24px 64px;
}

h3 {
	font-size: 16px;
	font-weight: 700;
	color: var(--brand-navy);
	margin: 0 0 12px;
}

/* ---- Scoreboard banner ---- */
.scoreboard {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	padding: 16px 24px;
	margin-bottom: 20px;
}

.scoreboard-row {
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 20px;
	flex-wrap: wrap;
}

.sb-team {
	display: flex;
	align-items: center;
	gap: 12px;
	flex: 1 1 0;
	min-width: 0;
}

.sb-team--visitor {
	justify-content: flex-end;
	text-align: right;
}

.sb-team--home {
	justify-content: flex-start;
	text-align: left;
}

.sb-team a {
	font-weight: 700;
	font-size: 18px;
	color: var(--link);
}

.sb-team img {
	height: 50px;
	width: 50px;
	object-fit: contain;
	flex-shrink: 0;
}

.sb-vs {
	font-size: 14px;
	color: var(--text-muted);
}

.sb-meta {
	margin-top: 8px;
	text-align: center;
}

.sb-meta p {
	font-size: 14px;
	color: var(--text-muted);
	margin: 2px 0;
}

/* ---- Section cards ---- */
.card {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	box-shadow: var(--shadow);
	padding: 18px 22px;
	margin-bottom: 20px;
}

.panel-row {
	display: flex;
	flex-wrap: wrap;
	gap: 20px;
	align-items: flex-start;
}

.panel-row .card {
	flex: 1 1 360px;
}

/* ---- Tables ---- */
table.fixedWidth {
	table-layout: fixed;
}

table {
	font-family: var(--font);
	font-size: 13px;
	border-collapse: collapse;
	width: 100%;
	border: none;
	border-top-left-radius: var(--radius);
	border-top-right-radius: var(--radius);
	overflow: hidden;
}

table td {
	font-size: 13px;
	border-bottom: 1px solid var(--border);
	padding: 8px 10px;
	vertical-align: middle;
}

/* Side borders drawn as cell borders so they match the row border exactly */
table td:first-child {
	border-left: 1px solid var(--border);
}

table td:last-child {
	border-right: 1px solid var(--border);
}

table td a {
	color: var(--link);
	font-weight: 600;
}

table th {
	font-size: 13px;
	font-weight: 800;
	letter-spacing: 0.02em;
	text-align: left;
	background-color: var(--brand-navy);
	color: #fff;
	padding: 10px;
}

table tr:hover {
	background-color: #eef2f7;
}

img {
	vertical-align: middle;
}

@media (max-width: 600px) {
	.container {
		padding: 20px 14px 48px;
	}
	.sb-team a {
		font-size: 15px;
	}
}
</style>
</head>
<body onload="setBannerAndTitle(); setTeamStats(); setSeasonResults(); setOdds(); setSpRankings(); setGameHistory();">

<div class="navbar">
	<a href="/">CFB GEEK</a>
	<a href="/teams">Teams</a>
	<a href="#" onclick="gotoYearSchedule(year)">Schedule</a>
	<a href="#" onclick="gotoYearStats(year)">Stats</a>
	<a href="#" onclick="gotoYearRankings(year)">Rankings</a>
	<a href="#" onclick="gotoYearRecruiting(year)">Recruiting</a>
</div>

<main class="container">

	<section id="bannerDiv" class="scoreboard"></section>

	<div class="card" id="oddsDiv"></div>

	<div class="card" id="spRankingsDiv"></div>

	<div class="panel-row">
		<div class="card" id="teamOffenseDiv"></div>
		<div class="card" id="teamDefenseDiv"></div>
	</div>

	<div class="panel-row">
		<div class="card" id="awaySeasonResultsDiv"></div>
		<div class="card" id="homeSeasonResultsDiv"></div>
	</div>

	<div class="card" id="gameHistoryDiv"></div>

</main>

<script th:inline="javascript">

var homeTeamName;
var homeTeamAbbr;
var homeTeamId;
var visitorTeamName;
var visitorTeamAbbr;
var visitorTeamId;
var year = /*[[${year}]]*/ null;

function setBannerAndTitle() {

	var gameHeader = /*[[${gamePreviewHeader}]]*/ null;
	var gameHeaderParsed = JSON.parse(gameHeader);
	var game = gameHeaderParsed[0];

	var site = (game.Site == 'NEUTRAL') ? 'vs' : 'at';

	var visitorUrl = "/teams/team/" + game.VisitorTeamId + "/year/" + game.Year;
	var homeUrl = "/teams/team/" + game.HomeTeamId + "/year/" + game.Year;
	var visitorLogo = `<img src='https://a.espncdn.com/i/teamlogos/ncaa/500/${game.VisitorTeamId}.png' height='50' width='50'>`;
	var homeLogo = `<img src='https://a.espncdn.com/i/teamlogos/ncaa/500/${game.HomeTeamId}.png' height='50' width='50'>`;
	var homeTeamRank = (game.HomeTeamRank == null) ? "" : "#" + game.HomeTeamRank;
	var visitorTeamRank = (game.VisitorTeamRank == null) ? "" : "#" + game.VisitorTeamRank;
	var homeTeamRecord = (game.HomeTeamRecord == null) ? "" : "(" + game.HomeTeamRecord + ")";
	var visitorTeamRecord = (game.VisitorTeamRecord == null) ? "" : "(" + game.VisitorTeamRecord + ")";
	var visitorTeamMascot = game.VisitorTeamMascot;
	var homeTeamMascot = game.HomeTeamMascot;

	//set globals for use by setBoxscoreTable()
	homeTeamName = game.HomeTeamName;
	homeTeamAbbr = game.HomeTeamAbbreviation;
	homeTeamId = game.HomeTeamId;
	visitorTeamName = game.VisitorTeamName;
	visitorTeamAbbr = game.VisitorTeamAbbreviation;
	visitorTeamId = game.VisitorTeamId;
	year = game.Year;

	var visitorTeamDetails = visitorTeamRank + " " + visitorTeamName + " " + visitorTeamMascot + " " + visitorTeamRecord;
	var homeTeamDetails = homeTeamRank + " " + homeTeamName + " " + homeTeamMascot + " " + homeTeamRecord;

	var html = `
		<div class="scoreboard-row">
			<div class="sb-team sb-team--visitor">
				<a href="${visitorUrl}">${visitorTeamDetails}</a>
				${visitorLogo}
			</div>
			<div class="sb-vs">${site}</div>
			<div class="sb-team sb-team--home">
				${homeLogo}
				<a href="${homeUrl}">${homeTeamDetails}</a>
			</div>
		</div>
		<div class="sb-meta">
			<p>${game.Date}</p>
		</div>`;

	document.title = game.Title;
	document.getElementById('bannerDiv').innerHTML = html;
}

function setTeamStats() {
	var awayTeamOffense = /*[[${awayTeamOffense}]]*/ null;
	var homeTeamOffense = /*[[${homeTeamOffense}]]*/ null;
	var awayTeamDefense = /*[[${awayTeamDefense}]]*/ null;
	var homeTeamDefense = /*[[${homeTeamDefense}]]*/ null;

	// offense for both teams
	var html = "<h3>Team Offense Stats</h3>";
 	html += "<table><tr>";
	html += "<th></th><th>" + visitorTeamName + "</th><th>" + homeTeamName + "</th></tr>";
	var awayJson = JSON.parse(awayTeamOffense);
	var homeJson = JSON.parse(homeTeamOffense);
	for(var key in awayJson[0]) {
		if(key == "TeamId" || key == "Team") {continue;}
		html+= "<tr><td>" + key + "</td><td>" + awayJson[0][key] + "</td><td>" + homeJson[0][key] + "</td></tr>";
	}
	html += "</table>";
	document.getElementById('teamOffenseDiv').innerHTML = html;

	// defense for both teams
	html = "<h3>Team Defense Stats</h3>";
 	html += "<table><tr>";
	html += "<th></th><th>" + visitorTeamName + "</th><th>" + homeTeamName + "</th></tr>";
	awayJson = JSON.parse(awayTeamDefense);
	homeJson = JSON.parse(homeTeamDefense);
	for(var key in awayJson[0]) {
		if(key == "TeamId" || key == "Team") {continue;}
		html+= "<tr><td>" + key + "</td><td>" + awayJson[0][key] + "</td><td>" + homeJson[0][key] + "</td></tr>";
	}
	html += "</table>";
	document.getElementById('teamDefenseDiv').innerHTML = html;
}

function setSeasonResults() {
	var awaySeasonResults = /*[[${awaySeasonResults}]]*/ null;
	var homeSeasonResults = /*[[${homeSeasonResults}]]*/ null;

	var json;
	var targetDiv;
	var teamId;
	var teamName;

	var teams = [visitorTeamId, homeTeamId];

	for(var t=0; t<teams.length; t++) {
		if(teams[t] == visitorTeamId) {
			teamId = visitorTeamId;
			teamName = visitorTeamName;
			json = JSON.parse(awaySeasonResults);
			targetDiv = "awaySeasonResultsDiv";
		} else {
			teamId = homeTeamId;
			teamName = homeTeamName;
			json = JSON.parse(homeSeasonResults);
			targetDiv = "homeSeasonResultsDiv";
		}

		var tableColumns = ["Date", "Opponent", "Result"];

		//set table header
		var html = "<h3>" + teamName + " Schedule</h3>";
		var columnsToExclude = ["GameId", "HomeTeamId", "AwayTeamId"];
		html += "<table>";
		html += getTableHeader(json[0], columnsToExclude);

		//add row data
		for(i=0; i<json.length; i++) {
			var row = json[i];
			var opponentId = teamId == row.HomeTeamId ? row.AwayTeamId : row.HomeTeamId;
			var opponentLink = `<a href='/teams/team/${opponentId}/year/${year}'>${row.Opponent}</a>`;
			var linkPage = (row.Result == "TBD") ? "gamepreview" : "boxscore";
			var gameLink = `<a href='/games/game/${row.GameId}/${linkPage}'>${row.Date}</a>`;

			var columnLinks = {
				Date : gameLink,
				Opponent : opponentLink,
			}

			html += getTableRow(row, columnsToExclude, columnLinks);
		}
		html += "</table>";

		document.getElementById(targetDiv).innerHTML = html;
	}
}

function setOdds() {
	var odds = /*[[${odds}]]*/ null;
	var json = JSON.parse(odds);
	var html = "<h3>Odds</h3>"
	html += "<table>";

	if(json[0] == undefined) {
		document.getElementById("oddsDiv").innerHTML = "<h3>Odds</h3><br>Data Currently Unavailable."
		return;
	}

	html += getTableHeader(json[0]);
	for(var i=0; i<json.length; i++) {
		html += getTableRow(json[i]);
	}
	html += "</table>";
	document.getElementById("oddsDiv").innerHTML = html;
}

function setSpRankings() {
	var spRankings = /*[[${spRankings}]]*/ null;
	var json = JSON.parse(spRankings);
	var html = "<h3>SP+ Rankings</h3>"
	html += "<table>";

	if(json[0] == undefined) {
		document.getElementById("spRankingsDiv").innerHTML = "<h3>SP+ Rankings</h3><br>Data Currently Unavailable."
		return;
	}

	html += getTableHeader(json[0]);
	for(var i=0; i<json.length; i++) {
		html += getTableRow(json[i]);
	}
	html += "</table>";
	document.getElementById("spRankingsDiv").innerHTML = html;
}

function setGameHistory() {
	var gameHistory = /*[[${gameHistory}]]*/ null;
	var json = JSON.parse(gameHistory);

	if(json[0] == undefined) {
		return;
	}

	var columnsToExclude = ["GameId", "Year", "WinnerTeamId", "HomeTeamId", "AwayTeamId"];

	var html = "<h3>Game History</h3>"
	html += "<table>";

	html += getTableHeader(json[0], columnsToExclude);

	//add table rows
	for(var i=0; i<json.length; i++) {
		var row = json[i];

		var gameLink = `<a href='/games/game/${row.GameId}/boxscore'>${row.Date}</a>`;
		var winnerTeamHistoryLink = `<a href='/teams/team/${row.WinnerTeamId}/year/${row.Year}'>${row.Winner}</a>`;
		var homeTeamYearLink = `<a href='/teams/team/${row.HomeTeamId}/year/${row.Year}'>${row.Home}</a>`;
		var awayTeamYearLink = `<a href='/teams/team/${row.AwayTeamId}/year/${row.Year}'>${row.Visitor}</a>`;

		var columnLinks = {
			Date : gameLink,
			Winner : winnerTeamHistoryLink,
			Home : homeTeamYearLink,
			Visitor : awayTeamYearLink
		}

		html += getTableRow(row, columnsToExclude, columnLinks);
	}
	html += "</table>";
	document.getElementById("gameHistoryDiv").innerHTML = html;
}

</script>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

<script type="text/javascript" th:src="@{/js/navbar.js}"></script>
<script type="text/javascript" th:src="@{/js/table.js}"></script>
</body>
</html>
